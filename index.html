<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HSB — Biblioteca de Ejercicios</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#d4001a;--black:#0a0a0a;--white:#fff;--gray:#f5f5f5;--gray2:#e8e8e8;--gray3:#888;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--gray);color:var(--black);-webkit-font-smoothing:antialiased;}
.header{background:var(--black);padding:0 20px;border-bottom:2px solid var(--red);position:sticky;top:0;z-index:100;}
.header-inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;height:52px;gap:12px;}
.header-logo{font-weight:900;font-size:18px;color:#fff;letter-spacing:-0.5px;}
.header-logo span{color:var(--red);}
.header-title{color:#bbb;font-size:13px;font-weight:500;}
.header-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;}
.mobile-strip{display:none;background:#141414;overflow-x:auto;padding:8px 12px;gap:6px;border-bottom:1px solid #2a2a2a;}
.layout{display:flex;height:calc(100vh - 52px);}
.sidebar{width:168px;background:#141414;padding:10px 7px;display:flex;flex-direction:column;gap:2px;flex-shrink:0;overflow-y:auto;}
.sidebar-label{color:#555;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin:4px 8px 6px;}
.sidebar-btn{background:transparent;color:#999;border:none;border-radius:6px;padding:8px 10px;cursor:pointer;text-align:left;font-size:12px;font-family:inherit;font-weight:400;transition:all .15s;width:100%;}
.sidebar-btn.active{background:var(--red);color:#fff;font-weight:700;}
.sidebar-div{border-top:1px solid #2a2a2a;margin:6px 4px;}
.sidebar-equip{background:transparent;color:#888;border:1px solid transparent;border-radius:6px;padding:7px 10px;cursor:pointer;text-align:left;font-size:12px;font-family:inherit;font-weight:400;transition:all .15s;width:100%;}
.sidebar-equip.active{color:var(--red);border-color:#d4001a44;font-weight:600;}
.sidebar-special{background:transparent;color:#777;border:1px solid transparent;border-radius:6px;padding:8px 10px;cursor:pointer;text-align:left;font-size:12px;font-family:inherit;font-weight:600;margin-top:2px;transition:all .15s;width:100%;}
.sidebar-special.active{background:#d4001a18;color:var(--red);border-color:#d4001a33;}
.list{width:215px;background:#fff;border-right:1px solid var(--gray2);display:flex;flex-direction:column;flex-shrink:0;}
.list-tabs{display:flex;border-bottom:1px solid var(--gray2);overflow-x:auto;}
.list-tab{flex-shrink:0;padding:9px 10px;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;font-size:10px;font-weight:700;color:var(--gray3);font-family:inherit;}
.list-tab.active{color:var(--red);border-bottom-color:var(--red);}
.list-search{padding:10px;border-bottom:1px solid var(--gray2);}
.list-search input{width:100%;font-size:12px;padding:6px 9px;border-radius:6px;border:1px solid var(--gray2);font-family:inherit;outline:none;background:var(--gray);}
.list-levels{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap;}
.list-count{font-size:10px;color:var(--gray3);margin-top:4px;}
.list-items{overflow-y:auto;flex:1;}
.list-item{display:flex;align-items:center;justify-content:space-between;width:100%;padding:9px 12px;background:transparent;border:none;border-bottom:1px solid var(--gray2);cursor:pointer;text-align:left;font-size:12px;line-height:1.4;color:var(--black);font-family:inherit;gap:6px;transition:background .1s;}
.list-item.active{background:var(--red);color:#fff;}
.list-item-left{display:flex;align-items:center;gap:6px;flex:1;}
.list-item-star{font-size:12px;cursor:pointer;flex-shrink:0;}
.lvl{font-size:9px;font-weight:700;padding:2px 5px;border-radius:8px;flex-shrink:0;}
.detail{flex:1;overflow-y:auto;padding:20px 24px;background:var(--gray);}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;opacity:.3;}
.card{max-width:680px;}
.card-header{display:flex;gap:16px;align-items:flex-start;margin-bottom:14px;padding:16px;background:#fff;border:1px solid var(--gray2);border-radius:12px;flex-wrap:wrap;}
.card-body{flex:1;min-width:160px;}
.card-title{font-size:18px;font-weight:800;color:var(--black);margin:0 0 8px;line-height:1.2;}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;}
.muscles-title{font-size:9px;color:var(--gray3);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin:0 0 4px;}
.muscles-row{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px;}
.muscle-pill{font-size:10px;padding:2px 8px;border-radius:12px;font-weight:500;}
.section{background:#fff;border:1px solid var(--gray2);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:0 0 12px;}
.step{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;}
.step-num{min-width:22px;height:22px;background:var(--red);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}
.step-text,.tip-text,.err-text{font-size:13px;color:var(--black);margin:0;line-height:1.6;}
.tip{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
.tip-arrow{color:var(--red);font-size:14px;flex-shrink:0;line-height:1;margin-top:3px;}
.err{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
.err-x{color:#a32d2d;font-size:13px;flex-shrink:0;line-height:1;margin-top:3px;}
.warmup-item{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px;padding:10px 12px;background:#fff;border-radius:8px;border:1px solid var(--gray2);}
.warmup-num{min-width:20px;height:20px;background:var(--red);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.anatomy{display:flex;flex-direction:column;align-items:center;gap:4px;}
.anatomy-views{display:flex;gap:10px;align-items:flex-end;}
.anatomy-label{font-size:8px;color:var(--gray3);font-weight:700;text-transform:uppercase;letter-spacing:.8px;text-align:center;}
.anatomy-legend{display:flex;align-items:center;gap:4px;margin-top:2px;}
.anatomy-dot{width:8px;height:8px;border-radius:2px;background:var(--red);}
.rutina-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#fff;border:1px solid var(--gray2);border-radius:8px;margin-bottom:8px;}
.rutina-item-name{font-size:13px;font-weight:600;color:var(--black);}
.rutina-item-group{font-size:10px;color:var(--gray3);margin-top:2px;}
.rutina-remove{background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:2px 6px;border-radius:4px;}
.rutina-remove:hover{color:var(--red);background:#fff0f0;}
.equip-card{background:#fff;border:1px solid var(--gray2);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.equip-card h3{font-size:12px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.equip-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:8px;}
.equip-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.equip-text{font-size:13px;color:var(--black);line-height:1.5;}
.equip-text strong{font-weight:700;}
.location-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;margin-bottom:6px;}
.mobile-menu-btn{display:none;background:var(--red);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;margin-left:auto;}
.add-rutina-btn{background:var(--red);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;margin-top:10px;width:100%;}
.add-rutina-btn:hover{background:#a32d2d;}
@media(max-width:700px){
  .sidebar{display:none;}
  .mobile-strip{display:flex;}
  .mobile-menu-btn{display:block;}
  .list{position:fixed;left:0;top:52px;bottom:0;z-index:50;display:none;width:240px;box-shadow:4px 0 20px rgba(0,0,0,.2);}
  .list.open{display:flex;}
  .detail{padding:14px;}
}
</style>
</head>

// CONTENIDO
function getContent(name,group,equip,level){
  var DB_CONTENT={
    'Press banca plano con barra':{mp:['Pectoral mayor'],ms:['Hombro frontal','Tríceps'],nivel:'Principiante',calzado:'Cualquier zapatilla. Los pies deben estar planos en el suelo.',tecnica:['Túmbate en el banco boca arriba. Los pies bien apoyados en el suelo, la espalda pegada al banco.','Agarra la barra con las manos un poco más separadas que los hombros. Las palmas mirando hacia los pies.','Baja la barra despacio hasta tocar el pecho a la altura de los pezones. No la dejes caer.','Empuja la barra hacia arriba hasta casi estirar los brazos. No los bloquees del todo.','Repite. Baja siempre despacio — no rebotes la barra en el pecho.'],consejos:['Junta los omóplatos como si quisieras apretar algo entre ellos — así protegés los hombros.','Los pies siempre en el suelo y firmes — es tu base de apoyo.','Una pequeña curva en la espalda baja es normal y correcta.'],errores:['Rebotar la barra en el pecho para ayudarte a subir — bájala siempre controlada.','Levantar los pies del suelo — pierdes toda la base.']},
    'Press banca inclinado con barra':{mp:['Pectoral superior','Hombro frontal'],ms:['Tríceps'],nivel:'Principiante',calzado:'Cualquier zapatilla.',tecnica:['Sube el respaldo del banco para que quede inclinado unos 30-40 grados — imagina una tumbona de playa, no demasiado vertical.','Siéntate y apoya toda la espalda. Los pies en el suelo.','Agarra la barra con las manos algo más separadas que los hombros.','Baja la barra despacio hacia la parte alta del pecho — cerca del cuello, no al centro.','Empuja hacia arriba y repite. No inclines el banco más de 45 grados o ya trabajará más el hombro que el pecho.'],consejos:['30-40 grados es el ángulo ideal para el pecho superior. Más inclinado ya es hombro.','Junta los omóplatos durante todo el movimiento.','Baja siempre controlado.'],errores:['Poner el banco casi vertical — ya no es pecho, es hombro.','Dejar caer la barra sin control.']},
    'Press banca declinado con barra':{mp:['Pectoral inferior'],ms:['Tríceps','Hombro frontal'],nivel:'Intermedio',calzado:'Cualquier zapatilla. Los tobillos se sujetan en los apoyos del banco.',tecnica:['Baja el respaldo del banco para que quede declinado — la cabeza queda más baja que los pies. Mete los tobillos en los apoyos para no resbalar.','Agarra la barra con las manos algo más separadas que los hombros.','Baja la barra hacia la parte baja del pecho — por debajo de los pezones.','Empuja hacia arriba y repite.','Cuidado al recolocar la barra al terminar — pide ayuda si el peso es grande.'],consejos:['El banco declinado trabaja la parte de abajo del pecho — la que da profundidad.','No pongas el banco muy inclinado — con 15-30 grados es suficiente.','Ten siempre a alguien cerca para ayudarte si el peso se atasca.'],errores:['Poner el banco muy declinado — pierdes estabilidad y es peligroso.','No sujetar bien los tobillos antes de empezar.']},
    'Press banca plano con mancuernas':{mp:['Pectoral mayor'],ms:['Hombro frontal','Tríceps'],nivel:'Principiante',calzado:'Cualquier zapatilla.',tecnica:['Siéntate al borde del banco con una mancuerna en cada mano apoyadas en los muslos.','Recuéstate hacia atrás llevando las mancuernas a los lados del pecho, codos doblados.','Empuja las mancuernas hacia arriba hasta casi estirar los brazos.','Baja despacio sintiendo el estiramiento del pecho.','Las muñecas siempre rectas — no las dobles hacia atrás.'],consejos:['Las mancuernas permiten bajar más que la barra — aprovéchalo para estirar mejor.','No juntes las mancuernas del todo arriba — mantén la tensión en el pecho.','Baja siempre despacio.'],errores:['Dejar caer las mancuernas de golpe — muy peligroso para los hombros.','Doblar las muñecas hacia atrás al empujar.']},
    'Aperturas banco plano con mancuernas':{mp:['Pectoral mayor'],ms:['Hombro frontal'],nivel:'Intermedio',calzado:'Cualquier zapatilla.',tecnica:['Túmbate en el banco con una mancuerna en cada mano, brazos casi estirados arriba del pecho.','Mantén los codos ligeramente doblados — ese ángulo NO cambia en ningún momento.','Abre los brazos hacia los lados como si abrazaras un árbol gigante, bajando hasta notar el estiramiento.','Vuelve a juntar las mancuernas arriba siguiendo el mismo arco del abrazo.','Para cuando notes tensión en el hombro — no bajes más de lo que el cuerpo pide.'],consejos:['Imagina siempre que abrazas un árbol — ese es el movimiento exacto.','Usa poco peso — el objetivo es sentir el estiramiento, no cargar mucho.','El codo siempre igual de doblado — si lo estiras, se convierte en press.'],errores:['Estirar los codos al bajar — eso convierte el ejercicio en un press.','Usar demasiado peso y no poder controlar la bajada.']},
    'Aperturas banco inclinado con mancuernas':{mp:['Pectoral superior'],ms:['Hombro frontal'],nivel:'Intermedio',calzado:'Cualquier zapatilla.',tecnica:['Sube el banco a unos 30-40 grados — como una tumbona de playa.','Coge una mancuerna en cada mano con los brazos casi estirados arriba.','Mantén los codos ligeramente doblados — igual que en las aperturas planas.','Abre los brazos hacia los lados y hacia abajo hasta notar el estiramiento en la parte alta del pecho.','Vuelve a juntar siguiendo el mismo arco.'],consejos:['La inclinación del banco hace que trabaje la parte de arriba del pecho.','El movimiento es igual que las aperturas planas, solo cambia el ángulo del banco.','Poco peso y mucho control.'],errores:['Estirar los codos durante el movimiento.','Abrir los brazos demasiado y forzar el hombro.']},
    'Dips en paralelas':{mp:['Pectoral inferior','Tríceps'],ms:['Hombro frontal'],nivel:'Intermedio',calzado:'Cualquier zapatilla.',tecnica:['Agárrate a las dos barras paralelas y apóyate con los brazos estirados, cuerpo en el aire.','Inclínate hacia adelante — así trabajará el pecho. Si te quedas recto, trabajará el tríceps.','Baja el cuerpo doblando los codos hasta que los hombros queden por debajo de los codos.','Sube empujando hacia arriba hasta casi estirar los brazos.','Repite sin balancear el cuerpo.'],consejos:['Inclinado hacia adelante = más pecho. Recto = más tríceps. Decide qué quieres trabajar.','Si es muy difícil, usa una banda elástica gruesa enganchada a la barra para ayudarte.','Cuando ya te quede fácil, cuelga un disco en un cinturón especial.'],errores:['No inclinarte hacia adelante si quieres trabajar el pecho.','Bajar demasiado — puede forzar el hombro si no tienes movilidad suficiente.']},
    'Cruce poleas alto':{mp:['Pectoral inferior'],ms:['Hombro frontal'],nivel:'Principiante',calzado:'Cualquier zapatilla.',tecnica:['Pon las poleas en la posición más ALTA de todo — en lo alto de la máquina. Agarra una asa en cada mano.','Da un paso al frente para que los cables estén tensos. Inclínate ligeramente hacia adelante.','Baja los brazos hacia el centro cruzándolos ligeramente, como si abrazaras algo.','Aguanta un momento con el pecho apretado y vuelve hacia atrás de forma controlada.','Los codos siempre ligeramente doblados — ese ángulo no cambia.'],consejos:['Polea ARRIBA del todo = trabaja la parte de ABAJO del pecho. Cuanto más alta la polea, más pecho inferior.','Mantén los codos siempre un poco doblados — nunca completamente estirados.','Alterna el brazo que queda encima en cada repetición.'],errores:['Abrir demasiado los brazos hacia atrás.','Ponerte muy recto sin inclinarte un poco hacia adelante.']},
    'Cruce poleas bajo':{mp:['Pectoral superior'],ms:['Hombro frontal'],nivel:'Principiante',calzado:'Cualquier zapatilla.',tecnica:['Pon las poleas en la posición más BAJA — casi en el suelo. Agarra una asa en cada mano.','Da un paso al frente y erguido. Los brazos van hacia arriba y al centro.','Sube los brazos hacia el centro cruzándolos ligeramente, como si hicieras un abrazo hacia arriba.','Aguanta un momento y vuelve abajo de forma controlada.','Los codos siempre ligeramente doblados.'],consejos:['Polea ABAJO = trabaja la parte de ARRIBA del pecho. Al revés que el cruce alto.','El movimiento es hacia arriba — no hacia adelante.','Usa poco peso para hacer el movimiento correcto.'],errores:['Doblar los codos al subir — el ángulo del codo no cambia.','No controlar el regreso hacia abajo.']},
    'Cruce poleas medio':{mp:['Pectoral mayor toda la zona'],ms:['Hombro frontal'],nivel:'Principiante',calzado:'Cualquier zapatilla.',tecnica:['Pon las poleas a la altura media — a la altura de los hombros aproximadamente.','Da un paso al frente con los brazos abiertos en cruz, codos ligeramente doblados.','Lleva ambos brazos hacia el centro al mismo tiempo, como cerrando un abrazo.','Cruza ligeramente las manos al llegar al centro y aguanta un momento.','Vuelve abriendo de forma controlada.'],consejos:['La polea a la altura de los hombros trabaja todo el pectoral de forma equilibrada.','Este es el cruce más completo de los tres — ideal si solo vas a hacer uno.','Poco peso y mucho control del movimiento.'],errores:['Abrir los brazos demasiado al volver.','Usar demasiado impulso del cuerpo.']},
    'Peso muerto convencional':{mp:['Isquiotibiales','Glúteos','Espalda baja'],ms:['Cuádriceps','Trapecios','Dorsales','Abdomen'],nivel:'Principiante',calzado:'⚠️ MUY IMPORTANTE: Zapatilla de SUELA PLANA — Converse, Vans o zapatilla de levantamiento. NUNCA zapatillas de running con suela gruesa porque pierdes estabilidad y es peligroso.',tecnica:['Ponte de pie con los pies separados al ancho de las caderas. La barra en el suelo, justo encima del mediopié — ni demasiado cerca ni demasiado lejos.','Agáchate doblando rodillas y caderas, agarra la barra con las manos justo fuera de las piernas.','Aprieta el abdomen fuerte, saca el pecho y mira hacia adelante.','Empuja el suelo hacia abajo con los pies mientras subes — como si quisieras hundir el suelo.','Sube manteniendo la barra pegada a las piernas todo el rato. Al llegar arriba, estira las caderas hacia adelante apretando los glúteos.'],consejos:['Piensa en "empujar el suelo" en lugar de "tirar de la barra" — activa mucho mejor los glúteos.','La barra siempre pegada al cuerpo — si se aleja, la espalda sufre el doble.','Si la espalda se redondea, el peso es demasiado — bájalo.'],errores:['Redondear la espalda al tirar — el error más peligroso de todo el gym.','Separar la barra del cuerpo durante la subida.']},
    'Dominadas agarre ancho':{mp:['Dorsal ancho','Redondo mayor'],ms:['Bíceps','Romboides'],nivel:'Intermedio',calzado:'Cualquier zapatilla.',tecnica:['Agárrate a la barra con las manos más separadas que los hombros, palmas mirando hacia adelante.','Cuelga con los brazos totalmente estirados. Aprieta el abdomen.','Hunde los hombros hacia abajo — como metiéndolos en los bolsillos. Luego dobla los codos tirando hacia arriba.','Sube hasta que la barbilla supere la barra.','Baja despacio y del todo — estira los brazos completamente antes de la siguiente repetición.'],consejos:['Hunde los hombros antes de doblar los codos — así la espalda trabaja más y los hombros sufren menos.','Si no puedes hacer ninguna, usa una goma elástica gruesa enganchada a la barra para ayudarte.','La bajada lenta es tan importante como la subida — no la ignores.'],errores:['Balancearse para subir — el movimiento tiene que ser limpio.','No bajar del todo — si no estiras los brazos, pierdes la mitad del ejercicio.']},
    'Remo con barra pronado':{mp:['Dorsal ancho','Romboides'],ms:['Bíceps','Hombro posterior'],nivel:'Principiante',calzado:'Cualquier zapatilla.',tecnica:['De pie, dobla un poco las rodillas e inclínate hacia adelante hasta que el torso quede casi horizontal — como si hicieras una reverencia.','Agarra la barra con las palmas mirando hacia el suelo, manos al ancho de los hombros.','Tira de la barra hacia el abdomen llevando los codos hacia atrás.','Aprieta los omóplatos al llegar arriba y aguanta 1 segundo.','Baja la barra despacio hasta estirar los brazos del todo.'],consejos:['El torso quieto — no te levantes para ayudarte a tirar.','Lleva los codos bien hacia atrás — si no, no aprietas bien la espalda.','Palmas hacia el suelo = más espalda. Palmas hacia arriba = más bíceps.'],errores:['Levantarte con el torso al tirar.','No llevar los codos suficientemente hacia atrás.']},
    'Face pull polea cuerda':{mp:['Hombro posterior','Romboides'],ms:['Manguito rotador','Bíceps'],nivel:'Principiante',calzado:'Cualquier zapatilla.',tecnica:['Coloca la polea a la altura de tu cara exactamente — ni más alta ni más baja. Pon la cuerda como accesorio.','Agarra cada extremo de la cuerda con una mano. Da un paso atrás hasta que los cables estén tensos.','Tira de la cuerda hacia tu cara separando los extremos mientras llevas los codos hacia atrás.','Al final, los pulgares apuntan hacia atrás y los codos están a la altura de los hombros o por encima.','Vuelve hacia adelante de forma controlada.'],consejos:['Este ejercicio cuida mucho el hombro — hazlo siempre con poco peso.','La polea tiene que estar exactamente a la altura de la cara — si está demasiado alta o baja, cambia el ejercicio.','Puedes hacerlo todos los días porque no fatiga mucho.'],errores:['Poner demasiado peso y perder la forma.','No llevar los codos suficientemente hacia atrás.']},
    'Press militar barra de pie':{mp:['Hombro frontal','Hombro lateral'],ms:['Tríceps','Trapecio','Abdomen'],nivel:'Principiante',calzado:'Zapatilla de suela plana — da más estabilidad cuando empujas hacia arriba de pie.',tecnica:['De pie, agarra la barra a la altura de la clavícula con las manos al ancho de los hombros o un poco más.','Aprieta el abdomen y los glúteos para que la espalda no se arquee.','Empuja la barra hacia arriba pasándola por delante de la cara.','Cuando los brazos estén arriba, mete la cabeza un poquito hacia adelante para que quede bajo la barra.','Baja la barra despacio hasta la posición de salida.'],consejos:['El abdomen apretado todo el rato — si la espalda se arquea hacia atrás, el peso es demasiado.','Las muñecas rectas — no las dobles hacia atrás al empujar.','De pie activa más el core que sentado — más difícil pero más completo.'],errores:['Arquear la espalda hacia atrás para poder subir la barra.','No estirar los brazos del todo arriba.']},
    'Elevaciones laterales mancuernas':{mp:['Hombro lateral'],ms:['Hombro frontal','Trapecio'],nivel:'Principiante',calzado:'Cualquier zapatilla.',tecnica:['De pie o sentado con una mancuerna en cada mano colgando a los lados. Codos ligeramente doblados.','Sube los brazos hacia los lados como alas de pájaro hasta que queden paralelos al suelo — no más arriba.','Al llegar arriba, el meñique debe estar un pelín más alto que el pulgar — como si vaciaras una botella.','Baja despacio — no dejes caer las mancuernas.','El cuerpo quieto todo el rato — no te balancees.'],consejos:['Poco peso — es un músculo pequeño y con mucho peso la forma se arruina.','Para 1 segundo arriba para sentir mejor la contracción.','Si los hombros suben hacia las orejas, el peso es demasiado.'],errores:['Balancearte para subir las mancuernas.','Subir los brazos por encima del paralelo — no hace falta y puede molestar el hombro.']},
    'Press Arnold con mancuernas':{mp:['Hombro frontal','Hombro lateral','Hombro posterior'],ms:['Tríceps','Trapecio'],nivel:'Intermedio',calzado:'Cualquier zapatilla.',tecnica:['Siéntate con una mancuerna en cada mano a la altura del pecho. Las palmas mirando HACIA TI al empezar — como el final de un curl.','Empieza a empujar hacia arriba mientras giras las muñecas poco a poco.','Al llegar arriba, las palmas deben mirar hacia ADELANTE — al contrario de como empezaron.','Al bajar, gira de nuevo hasta que las palmas miren hacia ti otra vez al llegar abajo.','La rotación ocurre durante todo el recorrido — no de golpe al principio.'],consejos:['El giro de muñecas activa las tres partes del hombro — es uno de los ejercicios de hombro más completos.','Hazlo fluido — no lo dividas en dos movimientos separados.','Apoya la espalda en el respaldo si lo tienes.'],errores:['Girar las muñecas solo al principio y no durante todo el movimiento.','Arquear la espalda al empujar.']},
    'Curl barra recta':{mp:['Bíceps'],ms:['Braquial anterior'],nivel:'Principiante',calzado:'Cualquier zapatilla.',tecnica:['De pie, agarra la barra con las palmas mirando hacia arriba, manos al ancho de los hombros.','Los codos pegados a los costados — ahí se quedan, no se mueven.','Dobla los codos subiendo la barra hasta la altura del pecho o los hombros.','Aprieta el bíceps arriba y aguanta 1 segundo.','Baja despacio estirando del todo los brazos.'],consejos:['Los codos quietos es lo más importante — si se van hacia adelante, el torso está ayudando.','Baja siempre hasta estirar del todo los brazos.','La bajada lenta es cuando más crece el músculo — no la ignores.'],errores:['Balancear el torso hacia adelante y atrás para subir la barra.','No bajar del todo los brazos.']},
    'Curl alterno mancuernas':{mp:['Bíceps'],ms:['Braquial anterior'],nivel:'Principiante',calzado:'Cualquier zapatilla.',tecnica:['De pie o sentado con una mancuerna en cada mano, brazos estirados a los lados.','Sube una mancuerna doblando el codo y girando la muñeca para que la palma mire hacia arriba al llegar.','Sube hasta la altura del hombro y aprieta el bíceps.','Baja despacio y repite con el otro brazo.','Los codos siempre quietos a los costados.'],consejos:['El giro de la muñeca al subir activa mejor el bíceps.','Trabajar un brazo solo te permite concentrarte más en él.','Baja hasta estirar el brazo del todo.'],errores:['Mover los codos hacia adelante al subir.','Balancear el cuerpo para ayudarte.']},
    'Curl martillo con mancuernas':{mp:['Braquiorradial','Braquial anterior'],ms:['Bíceps'],nivel:'Principiante',calzado:'Cualquier zapatilla.',tecnica:['De pie con una mancuerna en cada mano. El pulgar apunta hacia arriba — como un martillo.','Dobla los codos subiendo la mancuerna sin girar la muñeca en ningún momento.','Sube hasta la altura del hombro y baja despacio.','Los codos siempre pegados al cuerpo.','Puedes hacerlo con los dos brazos a la vez o alternándolos.'],consejos:['Este agarre trabaja más el antebrazo y el músculo debajo del bíceps.','Es más suave para las muñecas que el curl con barra recta.','Completa muy bien los curls normales.'],errores:['Girar la muñeca al subir — el pulgar tiene que apuntar arriba todo el rato.','Mover los codos hacia adelante.']},
    'Press frances con barra EZ':{mp:['Tríceps'],ms:['Ancóneo'],nivel:'Intermedio',calzado:'Cualquier zapatilla.',tecnica:['Túmbate en el banco boca arriba. Agarra la barra EZ — esa con forma de zigzag — con las manos juntas en el agarre interior.','Estira los brazos por encima del pecho. Los codos apuntan ligeramente hacia la cabeza.','Dobla solo los codos bajando la barra hacia la frente — o un pelín por encima.','Estira de nuevo los codos volviendo arriba.','Los codos juntos y apuntando al techo durante todo el movimiento — no los abras.'],consejos:['La barra en Z o EZ es más cómoda para las muñecas que la barra recta.','Si bajas la barra más hacia atrás de la cabeza, trabaja más la parte de atrás del tríceps.','Los codos juntos siempre — si se abren, el tríceps trabaja menos.'],errores:['Abrir los codos hacia los lados al bajar.','Bajar la barra sin control.']},
    'Pushdown polea alta con cuerda':{mp:['Tríceps'],ms:['Ancóneo'],nivel:'Principiante',calzado:'Cualquier zapatilla.',tecnica:['Pon la cuerda en la polea de lo más ALTO de la máquina. De pie frente a la máquina.','Agarra los dos extremos de la cuerda con las palmas enfrentadas. Los codos doblados a 90 grados.','Empuja hacia abajo estirando los codos. Al llegar al final, separa los extremos de la cuerda hacia afuera.','Las palmas miran hacia el suelo al llegar abajo y los pulgares apuntan hacia afuera.','Vuelve arriba de forma controlada sin levantar los codos.'],consejos:['La polea tiene que estar arriba del todo — si está baja, cambia el ejercicio.','Separar la cuerda al llegar abajo es lo que aprieta más el tríceps.','Los codos fijos a los lados — no los levantes al volver arriba.'],errores:['Levantar los codos al volver arriba.','Usar el cuerpo para empujar en lugar del tríceps.']},
    'Extension con una mancuerna sobre cabeza':{mp:['Tríceps parte posterior'],ms:['Tríceps'],nivel:'Principiante',calzado:'Cualquier zapatilla.',tecnica:['Sentado o de pie, agarra una mancuerna con las dos manos por debajo del disco de arriba.','Sube la mancuerna por encima de la cabeza con los brazos casi estirados.','Dobla los codos bajando la mancuerna por detrás de la cabeza — los codos apuntan al techo.','Estira de nuevo los codos volviendo arriba.','Los codos siempre juntos — no los abras hacia los lados.'],consejos:['Este ejercicio trabaja especialmente la parte de atrás del tríceps — la que da más volumen al brazo.','Los codos juntos siempre — si se abren, pierde efectividad.','Apoya la espalda en un respaldo si puedes.'],errores:['Abrir los codos hacia los lados.','Arquear la espalda al estirar los brazos arriba.']},
    'Sentadilla barra trasera':{mp:['Cuádriceps','Glúteos','Isquiotibiales'],ms:['Aductores','Abdomen','Espalda baja'],nivel:'Principiante',calzado:'⚠️ MUY IMPORTANTE: Zapatilla de SUELA PLANA — Converse, Vans o zapatilla de levantamiento. Las zapatillas de running con suela blanda hacen que pierdas equilibrio y es fácil lesionarse. Si tienes poca movilidad de tobillo y los talones se levantan, puedes poner una pequeña cuña debajo de los talones.',tecnica:['Pon la barra sobre la parte alta de la espalda — justo encima de los hombros.','Los pies separados al ancho de los hombros o un poco más. Las puntas ligeramente abiertas hacia afuera.','Aprieta el abdomen y baja como si fueras a sentarte en una silla muy baja, llevando las rodillas en la misma dirección que los pies.','Baja hasta que los muslos queden paralelos al suelo — o más abajo si puedes.','Sube empujando el suelo con los pies. El pecho siempre alto.'],consejos:['Las rodillas siempre apuntando hacia los pies — si colapsan hacia adentro, para.','El pecho alto y la mirada hacia adelante — si miras al suelo, la espalda se redondea.','Si los talones se levantan, prueba a abrir más las puntas de los pies.'],errores:['Las rodillas que se van hacia adentro al subir — el error más común.','Redondear la espalda baja al fondo de la sentadilla.']},
    'Peso muerto rumano':{mp:['Isquiotibiales','Glúteos'],ms:['Espalda baja','Aductores'],nivel:'Principiante',calzado:'Zapatilla de suela plana. Igual que en el peso muerto convencional.',tecnica:['De pie con los pies al ancho de las caderas. La barra o mancuernas delante de ti.','Empuja las caderas hacia ATRÁS manteniendo las rodillas casi rectas — solo un pelín dobladas.','Baja las pesas siguiendo el perfil de las piernas hasta notar el estiramiento detrás de los muslos.','La espalda siempre recta — cuando se doble, has llegado a tu límite.','Vuelve arriba empujando las caderas hacia adelante y apretando los glúteos.'],consejos:['Nota el estiramiento detrás de los muslos — cuando desaparezca o la espalda se curve, para.','El movimiento es como cerrar un cajón con las caderas — hacia atrás y hacia adelante.','Las rodillas casi rectas — si las doblas mucho, se convierte en sentadilla.'],errores:['Redondear la espalda baja al bajar.','Doblar demasiado las rodillas.']},
    'Prensa piernas 45 grados':{mp:['Cuádriceps','Glúteos'],ms:['Isquiotibiales','Aductores'],nivel:'Principiante',calzado:'Cualquier zapatilla. Los pies van en la plataforma de la máquina.',tecnica:['Siéntate en la máquina con la espalda y las nalgas bien apoyadas en el asiento.','Pon los pies en la plataforma al ancho de los hombros — ni muy arriba ni muy abajo.','Suelta los seguros de seguridad y baja la plataforma doblando las rodillas de forma controlada.','Baja hasta que las rodillas formen un ángulo de unos 90 grados.','Empuja la plataforma hacia arriba con los pies hasta casi estirar las rodillas — NUNCA las bloquees del todo.'],consejos:['Pies arriba y separados en la plataforma = más glúteos. Pies bajos y juntos = más cuádriceps.','Nunca bloquees las rodillas del todo al empujar — puede hacerles daño.','Las rodillas siempre apuntando en la misma dirección que los pies.'],errores:['Las rodillas que colapsan hacia adentro al empujar.','Las nalgas que se levantan del asiento — así la espalda baja trabaja de más.']},
    'Hip thrust con barra':{mp:['Glúteos'],ms:['Isquiotibiales','Abdomen'],nivel:'Principiante',calzado:'Cualquier zapatilla o descalzo.',tecnica:['Apoya la parte alta de la espalda en un banco — solo los hombros y la espalda alta, no toda la espalda.','Coloca la barra sobre las caderas. Pon una almohadilla, toalla enrollada o foam roller debajo para que no duela.','Baja las caderas hacia el suelo.','Empuja las caderas hacia arriba apretando los glúteos con mucha fuerza hasta que el cuerpo quede recto.','Aprieta los glúteos arriba durante 1-2 segundos antes de bajar.'],consejos:['Este es el mejor ejercicio para los glúteos — no lo saltes.','La almohadilla debajo de la barra es muy importante — sin ella duele mucho en las caderas.','Mete la barbilla hacia el pecho para no forzar el cuello.'],errores:['No llegar arriba del todo con las caderas — el glúteo no se contrae bien.','Las rodillas que caen hacia adentro al empujar.']},
    'Plancha frontal':{mp:['Abdomen','Transverso del abdomen'],ms:['Oblicuos','Glúteos','Cuádriceps'],nivel:'Principiante',calzado:'Cualquier zapatilla o descalzo.',tecnica:['Apóyate sobre los antebrazos y los dedos de los pies. Los codos justo debajo de los hombros.','El cuerpo forma una línea recta de la cabeza a los talones — como una tabla.','Aprieta el abdomen, los glúteos y los muslos.','La cabeza mirando al suelo — no la levantes.','Respira durante todo el tiempo que aguantes.'],consejos:['Si es muy difícil al principio, apoya las rodillas en lugar de los pies.','Empieza con 20-30 segundos e incrementa poco a poco.','Si las caderas caen o suben, corrígelo inmediatamente.'],errores:['Las caderas que caen hacia el suelo.','Las caderas que suben demasiado formando una pirámide.']},
    'Crunch abdominal con peso en pecho':{mp:['Recto abdominal'],ms:['Oblicuos'],nivel:'Principiante',calzado:'Cualquier zapatilla o descalzo. Mejor en colchoneta.',tecnica:['Túmbate boca arriba con las rodillas dobladas y los pies en el suelo. Sujeta el peso en el pecho.','Sube los hombros del suelo curvando la espalda hacia arriba — solo los hombros, la espalda baja no se mueve.','El cuello relajado — no lo fuerces.','Aguanta un momento arriba y baja despacio.','Exhala al subir — ayuda a contraer mejor el abdomen.'],consejos:['El movimiento es pequeño — no te incorpores del todo.','Baja siempre despacio.','Sin peso primero hasta dominar la técnica, luego añade.'],errores:['Tirar del cuello para subir.','Subir demasiado — el abdomen deja de trabajar al final.']},
    'Russian twist con disco':{mp:['Oblicuos'],ms:['Abdomen','Psoas'],nivel:'Intermedio',calzado:'Cualquier zapatilla o descalzo.',tecnica:['Siéntate en el suelo con las rodillas dobladas. Inclínate hacia atrás unos 45 grados — como a medio camino de tumbarte.','Agarra el disco o peso con las dos manos frente al pecho.','Gira el cuerpo hacia un lado llevando el peso casi al suelo.','Vuelve al centro y gira hacia el otro lado.','El movimiento viene del cuerpo, no de los brazos.'],consejos:['Levantar los pies del suelo hace el ejercicio más difícil.','Gira todo el cuerpo — no solo muevas los brazos.','Si la espalda se redondea, reduce el ángulo de inclinación.'],errores:['Girar solo los brazos sin girar el torso.','Ir demasiado rápido usando el impulso.']},
    'Ab wheel rollout':{mp:['Abdomen','Transverso'],ms:['Dorsales','Hombros'],nivel:'Avanzado',calzado:'Descalzo o zapatilla. Usa colchoneta para las rodillas.',tecnica:['Arrodíllate con la rueda de abdominales justo debajo de los hombros.','Aprieta el abdomen muy fuerte y empieza a rodar hacia adelante estirando los brazos.','Llega tan lejos como puedas sin que las caderas bajen ni la espalda se curve.','Vuelve a la posición inicial contrayendo el abdomen.','La espalda recta durante todo el movimiento.'],consejos:['Empieza con poco recorrido e incrementa poco a poco.','Antes de intentarlo, debes poder aguantar la plancha 60 segundos sin problema.','Es uno de los ejercicios de abdomen más exigentes que existen.'],errores:['Las caderas que bajan al extenderse — puede lesionar la espalda.','No apretar el abdomen antes de empezar.']},
    'Elevacion piernas colgado en barra':{mp:['Abdomen inferior','Psoas'],ms:['Oblicuos'],nivel:'Avanzado',calzado:'Cualquier zapatilla.',tecnica:['Cuélgate de una barra con las manos al ancho de los hombros y las palmas hacia adelante.','Aprieta el abdomen.','Sube las piernas llevando las rodillas hacia el pecho — versión fácil.','O sube las piernas rectas hasta el nivel de las manos — versión difícil.','Baja de forma completamente controlada sin balancearte.'],consejos:['Empieza con rodillas dobladas y cuando te resulte fácil, pasa a piernas rectas.','Si te balanceas, usa el abdomen para frenarte.','Exhala al subir.'],errores:['Balancearse para ayudarse a subir.','Dejar caer las piernas de golpe al bajar.']}

  var gData={
    pecho:{mp:['Pectoral mayor'],ms:['Hombro frontal','Tríceps'],tecnica:['Adopta la posición inicial con la espalda apoyada y los pies en el suelo.','Coloca las manos en la posición correcta para el ejercicio.','Ejecuta el movimiento de forma controlada sintiendo el trabajo en el pecho.','Lleva el movimiento hasta el rango completo.','Regresa a la posición inicial de forma controlada.'],calzado:'Cualquier zapatilla.'},
    espalda:{mp:['Dorsal ancho','Trapecios'],ms:['Bíceps','Romboides'],tecnica:['Adopta la posición con la espalda en posición neutra.','Hunde los hombros hacia abajo antes de empezar el movimiento.','Tira del peso hacia el cuerpo llevando los codos hacia atrás.','Contrae la espalda en el punto de máxima contracción.','Regresa de forma controlada.'],calzado:'Zapatilla plana para ejercicios de pie. Cualquier zapatilla para los demás.'},
    hombros:{mp:['Deltoides'],ms:['Trapecios','Manguito rotador'],tecnica:['Adopta la posición con los pies estables y el abdomen apretado.','Mantén los codos en la posición correcta.','Ejecuta el movimiento sin usar el impulso del cuerpo.','Llega al rango completo.','Controla el regreso.'],calzado:'Cualquier zapatilla.'},
    biceps:{mp:['Bíceps'],ms:['Braquial anterior'],tecnica:['Mantén los codos fijos a los costados durante todo el movimiento.','Dobla el codo subiendo el peso hacia el hombro.','Gira la muñeca si procede para maximizar la activación.','Contrae el bíceps arriba y aguanta 1 segundo.','Baja de forma completamente controlada.'],calzado:'Cualquier zapatilla.'},

function saveRutina(){try{localStorage.setItem('hsb_rutina',JSON.stringify(miRutina));}catch(e){}}
function isInRutina(name){return miRutina.some(function(r){return r.name===name;});}
function toggleRutina(name,group){

}

function renderList(){
  var s=document.getElementById('search');
  var search=s?s.value.toLowerCase():'';
  var exs=(DB[grp]&&DB[grp][equip])||[];
  var wl=exs.map(function(e,i){return{name:e,level:LVL_PAT[i]||'Intermedio'};});
  var fl=wl.filter(function(e){return(level==='Todos'||e.level===level)&&e.name.toLowerCase().indexOf(search)!==-1;});
  var lh='';
  LEVELS.forEach(function(l){
    var act=level===l;
    var bg=act?(l==='Todos'?'#333':LVL_BG[l]):'#f0f0f0';
    var col=act?(l==='Todos'?'#fff':LVL_C[l]):'#888';
    var bor=act&&l!=='Todos'?'1px solid '+LVL_C[l]+'44':'1px solid transparent';
    lh+='<button onclick="setLevel(\''+l+'\')" style="font-size:10px;padding:3px 7px;border-radius:20px;border:'+bor+';cursor:pointer;font-family:inherit;font-weight:600;background:'+bg+';color:'+col+';">'+(l==='Todos'?'Todos':l.slice(0,5)+'.')+'</button>';
  });
  document.getElementById('levels').innerHTML=lh;
  document.getElementById('count').textContent=fl.length+' ejercicios';
  var h='';
  fl.forEach(function(ex){
    var act=selEx===ex.name;
    var lc=LVL_C[ex.level];var lb=LVL_BG[ex.level];
    var star=isInRutina(ex.name)?'⭐':'☆';
    var safeName=ex.name.replace(/'/g,'\\\'');
    h+='<button class="list-item'+(act?' active':'')+'" onclick="showEx(\''+safeName+'\',\''+ex.level+'\')">';
    h+='<div class="list-item-left"><span>'+ex.name+'</span></div>';
    h+='<div style="display:flex;align-items:center;gap:4px;">';
    h+='<span class="list-item-star" onclick="event.stopPropagation();toggleRutina(\''+safeName+'\',\''+grp+'\')" title="Añadir a Mi Rutina">'+star+'</span>';
    h+='<span class="lvl" style="background:'+(act?'rgba(255,255,255,0.25)':lb)+';color:'+(act?'#fff':lc)+';">'+ex.level.slice(0,3).toUpperCase()+'</span>';
    h+='</div></button>';
  });
  document.getElementById('list-items').innerHTML=h||'<div style="padding:2rem;text-align:center;font-size:13px;color:var(--gray3);">Sin resultados</div>';
}

      h+='</div>';
    });
    h+='<button onclick="clearRutina()" style="width:100%;margin-top:8px;padding:8px;background:#fff0f0;border:1px solid #ffcccc;color:var(--red);border-radius:6px;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;">Borrar toda la rutina</button>';
  }
  h+='</div>';
  document.getElementById('list-items').innerHTML=h;
}

function removeFromRutina(name){miRutina=miRutina.filter(function(r){return r.name!==name;});saveRutina();renderRutinaList();renderRutina();}
function clearRutina(){if(confirm('¿Borrar toda la rutina?')){miRutina=[];saveRutina();renderRutinaList();renderRutina();}}

function renderRutina(){
  if(miRutina.length===0){
    document.getElementById('detail').innerHTML='<div class="empty"><div style="font-size:40px;">⭐</div><p style="font-size:14px;color:var(--gray3);text-align:center;">Tu rutina está vacía.<br>Haz clic en la ☆ de cualquier<br>ejercicio para añadirlo.</p></div>';
    return;
  }
  var byGroup={};
  miRutina.forEach(function(r){if(!byGroup[r.group])byGroup[r.group]=[];byGroup[r.group].push(r);});
  var h='<div style="max-width:640px;"><h2 style="font-size:18px;font-weight:800;margin-bottom:16px;">⭐ Mi Rutina</h2>';
  Object.keys(byGroup).forEach(function(gid){
    var gl=GROUPS.find(function(g){return g.id===gid;});
    h+='<div style="background:#fff;border:1px solid var(--gray2);border-radius:10px;padding:14px 16px;margin-bottom:12px;">';
    h+='<h3 style="font-size:12px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;">'+gl.label+'</h3>';
    byGroup[gid].forEach(function(r){
      var safeName=r.name.replace(/'/g,'\\\'');
      h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--gray2);">';
      h+='<span style="font-size:13px;color:var(--black);cursor:pointer;" onclick="showExFromRutina(\''+safeName+'\',\''+r.group+'\',\''+r.equip+'\')">'+r.name+'</span>';
      h+='<button onclick="removeFromRutina(\''+safeName+'\')" style="background:none;border:none;color:#ccc;cursor:pointer;font-size:13px;padding:2px 6px;">✕</button>';
      h+='</div>';
    });
    h+='</div>';
  });
  h+='<button onclick="clearRutina()" style="width:100%;padding:10px;background:#fff0f0;border:1px solid #ffcccc;color:var(--red);border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;">Borrar toda la rutina</button></div>';
  document.getElementById('detail').innerHTML=h;
}

function showExFromRutina(name,group,eq){
  grp=group;equip=eq;selEx=name;
  setView('ejercicios');
  showEx(name,'Intermedio');
}

function setGroup(g){grp=g;selEx=null;renderSidebar();renderMobileStrip();if(view==='ejercicios'){document.getElementById('search-wrap').style.display='block';renderList();}else if(view==='warmup')renderWarmup();else if(view==='equipacion')renderEquipacionList();else if(view==='rutina')renderRutinaList();}
function setEquip(e){equip=e;selEx=null;renderSidebar();renderMobileStrip();if(view==='ejercicios'){document.getElementById('search-wrap').style.display='block';renderList();}showEmpty();}
function setLevel(l){level=l;renderList();}
function setView(v){
  view=v;
  document.getElementById('tab-ej').classList.toggle('active',v==='ejercicios');
  document.getElementById('tab-wu').classList.toggle('active',v==='warmup');
  document.getElementById('tab-rutina').classList.toggle('active',v==='rutina');
  renderSidebar();
  if(v==='ejercicios'){document.getElementById('search-wrap').style.display='block';renderList();showEmpty();}
  else if(v==='warmup'){renderWarmup();showEmpty();}
  else if(v==='equipacion'){renderEquipacionList();}
  else if(v==='rutina'){renderRutinaList();renderRutina();}
}
function showEmpty(){document.getElementById('detail').innerHTML='<div class="empty"><div style="font-size:40px;">🏋️</div><p style="font-size:14px;color:var(--gray3);text-align:center;">Selecciona un ejercicio<br>para ver los detalles</p></div>';}

function showEx(name,lv){
  selEx=name;renderList();
  document.getElementById('list').classList.remove('open');
  var d=getContent(name,grp,equip,lv);
  var gl=GROUPS.find(function(g){return g.id===grp;}).label;
  var el=(EQUIP.find(function(e){return e.id===equip;})||{label:equip}).label;
  var inRut=isInRutina(name);
  var safeName=name.replace(/'/g,'\\\'');
  var h='<div class="card">';
  // Header
  h+='<div class="card-header">';
  h+=getAnatomy(grp);
  h+='<div class="card-body">';
  h+='<h1 class="card-title">'+name+'</h1>';
  h+='<div class="badges">';
  h+='<span class="badge" style="background:var(--red);color:#fff;">'+gl+'</span>';
  h+='<span class="badge" style="background:#f0f0f0;color:#555;border:1px solid var(--gray2);">'+el+'</span>';
  if(equip==='casa') h+='<span class="badge" style="background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;">🏠 En casa</span>';
  h+='<span class="badge" style="background:'+LVL_BG[lv]+';color:'+LVL_C[lv]+';border:1px solid '+LVL_C[lv]+'44;">'+lv+'</span>';
  h+='</div>';
  if(d.mp&&d.mp.length){h+='<p class="muscles-title">Músculos principales</p><div class="muscles-row">';d.mp.forEach(function(m){h+='<span class="muscle-pill" style="background:var(--red);color:#fff;">'+m+'</span>';});h+='</div>';}
  if(d.ms&&d.ms.length){h+='<p class="muscles-title" style="margin-top:4px;">Secundarios</p><div class="muscles-row">';d.ms.forEach(function(m){h+='<span class="muscle-pill" style="background:#f0f0f0;color:#555;border:1px solid var(--gray2);">'+m+'</span>';});h+='</div>';}
  // Calzado
  if(d.calzado){h+='<div style="margin-top:8px;padding:8px 10px;background:#fffbea;border:1px solid #f5c800;border-radius:6px;"><p style="font-size:11px;font-weight:700;color:#7a6000;margin-bottom:3px;">👟 Calzado</p><p style="font-size:12px;color:#5a4000;line-height:1.5;">'+d.calzado+'</p></div>';}
  h+='</div></div>';
  // Botón añadir a rutina
  h+='<button onclick="toggleRutina(\''+safeName+'\',\''+grp+'\')" style="width:100%;padding:10px;background:'+(inRut?'#fff0f0':'#f0fff0')+';border:1px solid '+(inRut?'#ffcccc':'#a5d6a7')+';color:'+(inRut?'var(--red)':'#2e7d32')+';border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;margin-bottom:10px;">'+(inRut?'✕ Quitar de Mi Rutina':'⭐ Añadir a Mi Rutina')+'</button>';
  // Video
  h+='<a href="'+getVideoUrl(name)+'" target="_blank" style="display:flex;align-items:center;gap:10px;background:#ff0000;color:#fff;text-decoration:none;padding:12px 16px;border-radius:10px;margin-bottom:10px;font-weight:700;font-size:13px;"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>Ver vídeo en YouTube</a>';
  // Técnica
  h+='<div class="section"><h2 class="section-title" style="color:var(--red);">Cómo se hace — paso a paso</h2>';
  (d.tecnica||[]).forEach(function(s,i){h+='<div class="step"><span class="step-num">'+(i+1)+'</span><p class="step-text">'+s+'</p></div>';});
  h+='</div>';
  // Consejos
  h+='<div class="section"><h2 class="section-title" style="color:var(--red);">Consejos importantes</h2>';
  (d.consejos||[]).forEach(function(t){h+='<div class="tip"><span class="tip-arrow">→</span><p class="tip-text">'+t+'</p></div>';});
  h+='</div>';
  // Errores
  if(d.errores&&d.errores.length){
    h+='<div class="section" style="background:#fff8f8;border-color:#ffdddd;"><h2 class="section-title" style="color:#a32d2d;">Errores que hay que evitar</h2>';
    d.errores.forEach(function(e){h+='<div class="err"><span class="err-x">✕</span><p class="err-text">'+e+'</p></div>';});
    h+='</div>';
  }
  h+='</div>';
  document.getElementById('detail').innerHTML=h;
}

document.getElementById('mobile-menu-btn').onclick=function(){document.getElementById('list').classList.toggle('open');};
renderSidebar();renderMobileStrip();renderList();
</script>
</body>
</html>
