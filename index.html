<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HSB — Nutrición</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--acc:#f5c800;--accdark:#c9a200;--black:#0a0a0a;--white:#fff;--gray:#f5f5f5;--gray2:#e8e8e8;--gray3:#888;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--gray);color:var(--black);-webkit-font-smoothing:antialiased;}
.header{background:var(--black);padding:0 20px;border-bottom:2px solid var(--acc);position:sticky;top:0;z-index:100;}
.header-inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;height:52px;gap:12px;}
.header-logo{font-weight:900;font-size:18px;color:#fff;}
.header-logo span{color:var(--acc);}
.header-title{color:#bbb;font-size:13px;font-weight:500;}
.header-badge{margin-left:auto;background:var(--acc);color:var(--black);font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;}
.mobile-menu-btn{display:none;background:var(--acc);color:var(--black);border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;}
.layout{display:flex;height:calc(100vh - 52px);}
.sidebar{width:195px;background:#141414;padding:10px 7px;display:flex;flex-direction:column;gap:2px;flex-shrink:0;overflow-y:auto;}
.sidebar-label{color:#555;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin:4px 8px 6px;}
.sidebar-btn{background:transparent;color:#999;border:none;border-radius:6px;padding:8px 10px;cursor:pointer;text-align:left;font-size:12px;font-family:inherit;font-weight:400;transition:all .15s;width:100%;}
.sidebar-btn.active{background:var(--acc);color:var(--black);font-weight:700;}
.sidebar-div{border-top:1px solid #2a2a2a;margin:6px 4px;}
.list{width:225px;background:#fff;border-right:1px solid var(--gray2);display:flex;flex-direction:column;flex-shrink:0;}
.list-search{padding:10px;border-bottom:1px solid var(--gray2);}
.list-search input{width:100%;font-size:12px;padding:6px 9px;border-radius:6px;border:1px solid var(--gray2);font-family:inherit;outline:none;background:var(--gray);}
.list-count{font-size:10px;color:var(--gray3);margin-top:4px;}
.list-items{overflow-y:auto;flex:1;}
.list-item{display:flex;align-items:center;justify-content:space-between;width:100%;padding:9px 12px;background:transparent;border:none;border-bottom:1px solid var(--gray2);cursor:pointer;text-align:left;font-size:12px;line-height:1.4;color:var(--black);font-family:inherit;gap:6px;transition:background .1s;}
.list-item.active{background:var(--acc);color:var(--black);}
.list-item-emoji{font-size:14px;flex-shrink:0;}
.kcal-badge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;background:#f0f0f0;color:#555;flex-shrink:0;}
.list-item.active .kcal-badge{background:rgba(0,0,0,0.15);color:var(--black);}
.detail{flex:1;overflow-y:auto;padding:20px 24px;background:var(--gray);}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;opacity:.3;}
.card{max-width:700px;}
.food-header{background:#fff;border:1px solid var(--gray2);border-radius:12px;padding:18px;margin-bottom:12px;}
.food-title{font-size:20px;font-weight:800;margin-bottom:10px;}
.macros-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;}
.macro-card{border-radius:10px;padding:12px;text-align:center;}
.macro-num{font-size:20px;font-weight:900;line-height:1;}
.macro-unit{font-size:10px;font-weight:600;opacity:.7;}
.macro-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:4px;opacity:.8;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.info-pill{background:var(--gray);border-radius:8px;padding:8px 10px;font-size:11px;}
.info-pill strong{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--gray3);margin-bottom:2px;}
.fsec{background:#fff;border:1px solid var(--gray2);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.fsec h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--accdark);margin-bottom:10px;}
.fsec p{font-size:13px;color:var(--black);line-height:1.7;}
.shop-item{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--gray2);}
.shop-item:last-child{border-bottom:none;}
.shop-icon{font-size:18px;flex-shrink:0;}
.shop-text{font-size:13px;color:var(--black);line-height:1.5;}
.shop-text strong{font-weight:700;}
.alt-pill{display:inline-flex;background:#f0f0f0;border:1px solid var(--gray2);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--black);margin:3px;}
.section-full{background:#fff;border:1px solid var(--gray2);border-radius:10px;padding:16px;margin-bottom:10px;}
.section-full h2{font-size:13px;font-weight:800;color:var(--accdark);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;}
.warn-box{background:#fff8f8;border:1px solid #ffdddd;border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.warn-box h3{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#a32d2d;margin-bottom:10px;}
.warn-item{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
.warn-x{color:#a32d2d;font-size:13px;flex-shrink:0;margin-top:2px;}
.comp-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.comp-card{background:#fff;border:1px solid var(--gray2);border-radius:10px;padding:14px;text-align:center;}
.comp-macro{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--gray2);font-size:12px;}
.comp-macro:last-child{border-bottom:none;}
.compra-cat{margin-bottom:14px;}
.compra-cat h3{font-size:11px;font-weight:800;color:var(--accdark);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.compra-grid{display:flex;flex-wrap:wrap;gap:6px;}
.compra-pill{background:#f0f0f0;border:1px solid var(--gray2);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;}
@media(max-width:700px){
  .sidebar{display:none;}
  .mobile-menu-btn{display:block;}
  .list{position:fixed;left:0;top:52px;bottom:0;z-index:50;display:none;width:245px;box-shadow:4px 0 20px rgba(0,0,0,.2);}
  .list.open{display:flex;flex-direction:column;}
  .detail{padding:14px;}
  .macros-grid{grid-template-columns:repeat(2,1fr);}
  .comp-grid{grid-template-columns:1fr;}
  .info-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="login-screen" style="position:fixed;inset:0;background:#0a0a0a;display:flex;align-items:center;justify-content:center;z-index:999;">
  <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;padding:2.5rem;width:100%;max-width:360px;text-align:center;">
    <div style="font-size:28px;font-weight:900;color:#fff;letter-spacing:-1px;margin-bottom:4px;">HSB <span style="color:#f5c800;">|</span></div>
    <div style="font-size:13px;color:#666;margin-bottom:2rem;">Guía de Nutrición</div>

  </div>
</div>
<div class="header">
  <div class="header-inner">
    <div class="header-logo">HSB <span>|</span></div>

</div>
<div class="layout">

</div>

// STATE
var catSel='proteina',selId=null,viewMode='alimentos',comparSel=[];

function renderSidebar(){
  var sb=document.getElementById('sidebar');
  var alimCats=['proteina','hidrato','legumbre','grasa','frutoseco','verdura','fruta','lacteo','suplemento','condimento','bebida','snack'];
  var toolCats=['evitar','comparador','recetas','mealprep','supermercado','cocina_mundo','alcohol','noche','consejos','compra'];
  var h='<div class="sidebar-label">Alimentos</div>';
  alimCats.forEach(function(id){var c=CATS.find(function(x){return x.id===id;});h+='<button class="sidebar-btn'+(catSel===id&&viewMode==='alimentos'?' active':'')+'" onclick="setCat(\''+id+'\')">'+c.label+'</button>';});
  h+='<div class="sidebar-div"></div><div class="sidebar-label">Guías y herramientas</div>';
  toolCats.forEach(function(id){var c=CATS.find(function(x){return x.id===id;});h+='<button class="sidebar-btn'+(viewMode===id?' active':'')+'" onclick="setTool(\''+id+'\')">'+c.label+'</button>';});
  sb.innerHTML=h;
}

function setCat(cat){catSel=cat;viewMode='alimentos';selId=null;renderSidebar();renderList();showEmpty();}
function setTool(v){viewMode=v;selId=null;renderSidebar();
  if(v==='evitar'){renderEvitarList();showEmpty();}
  else if(v==='comparador'){renderComparList();showEmpty();}
  else if(v==='recetas'){renderRecetasList();showEmpty();}
  else if(v==='mealprep'){renderMealPrepList();renderMealPrep();}
  else if(v==='supermercado'){renderSuperList();showEmpty();}
  else if(v==='cocina_mundo'){renderMundoList();showEmpty();}
  else if(v==='alcohol'){renderInfoList('alcohol');renderInfo('alcohol');}
  else if(v==='noche'){renderInfoList('noche');renderInfo('noche');}
  else if(v==='consejos'){renderConsejosList();showEmpty();}
  else if(v==='compra'){document.getElementById('list-items').innerHTML='<div style="padding:12px;font-size:12px;color:var(--gray3);">Lista base HSB</div>';renderCompraView();}
}

function renderList(){
  var s=document.getElementById('search').value.toLowerCase();
  var items=DB.filter(function(a){return a.cat===catSel&&!a.esInfoOnly&&a.n.toLowerCase().indexOf(s)!==-1;});
  document.getElementById('count').textContent=items.length+' alimentos';
  var h='';
  items.forEach(function(a){
    var act=selId===a.id;
    h+='<button class="list-item'+(act?' active':'')+'" onclick="showItem(\''+a.id+'\')">';
    h+='<span class="list-item-emoji">'+a.emoji+'</span><span style="flex:1;text-align:left;">'+a.n+'</span>';
    if(!a.noMacros&&a.kcal>0) h+='<span class="kcal-badge">'+a.kcal+'kcal</span>';
    h+='</button>';
  });
  document.getElementById('list-items').innerHTML=h||'<div style="padding:2rem;text-align:center;font-size:13px;color:var(--gray3);">Sin resultados</div>';
}

function renderEvitarList(){
  var h='<div style="padding:10px;">';
  EVITAR.forEach(function(e){h+='<button onclick="showEvitar(\''+e.id+'\')" class="list-item"><span class="list-item-emoji">'+e.emoji+'</span><span>'+e.titulo+'</span></button>';});
  h+='</div>';
  document.getElementById('list-items').innerHTML=h;
}

function renderComparList(){
  var h='<div style="padding:10px;"><p style="font-size:10px;color:var(--gray3);font-weight:700;text-transform:uppercase;margin-bottom:6px;">Selecciona 2 alimentos</p>';
  DB.filter(function(a){return !a.esInfoOnly&&a.kcal>0;}).forEach(function(a){
    var sel=comparSel.indexOf(a.id)!==-1;
    h+='<button onclick="toggleCompar(\''+a.id+'\')" class="list-item'+(sel?' active':'')+'">';
    h+='<span class="list-item-emoji">'+a.emoji+'</span><span style="flex:1;text-align:left;">'+a.n+'</span>';
    if(sel) h+='<span style="font-size:10px;font-weight:700;">✓</span>';
    h+='</button>';
  });
  h+='</div>';
  document.getElementById('list-items').innerHTML=h;
}

function toggleCompar(id){
  var idx=comparSel.indexOf(id);
  if(idx!==-1)comparSel.splice(idx,1);
  else if(comparSel.length<2)comparSel.push(id);
  else comparSel=[comparSel[1],id];
  renderComparList();
  if(comparSel.length===2)renderComparacion();
  else showEmpty();
}

function renderComparacion(){
  var a1=DB.find(function(a){return a.id===comparSel[0];});
  var a2=DB.find(function(a){return a.id===comparSel[1];});
  var h='<div class="card"><h2 style="font-size:16px;font-weight:800;margin-bottom:14px;">📊 Comparativa por 100g</h2><div class="comp-grid">';
  [a1,a2].forEach(function(a){
    h+='<div class="comp-card"><div style="font-size:24px;margin-bottom:4px;">'+a.emoji+'</div><div style="font-size:13px;font-weight:800;margin-bottom:10px;">'+a.n+'</div>';
    h+='<div class="comp-macro"><span style="color:var(--gray3);font-weight:600;font-size:12px;">Calorías</span><span style="font-weight:700;font-size:12px;">'+a.kcal+' kcal</span></div>';
    h+='<div class="comp-macro"><span style="color:#c0392b;font-weight:600;font-size:12px;">Proteína</span><span style="font-weight:700;color:#c0392b;font-size:12px;">'+a.p+'g</span></div>';
    h+='<div class="comp-macro"><span style="color:#d35400;font-weight:600;font-size:12px;">Hidratos</span><span style="font-weight:700;color:#d35400;font-size:12px;">'+a.c+'g</span></div>';
    h+='<div class="comp-macro"><span style="color:#27ae60;font-weight:600;font-size:12px;">Grasas</span><span style="font-weight:700;color:#27ae60;font-size:12px;">'+a.g+'g</span></div>';
    h+='</div>';
  });
  h+='</div>';
  var masP=a1.p>=a2.p?a1:a2;
  var menosK=a1.kcal<=a2.kcal?a1:a2;
  h+='<div class="fsec"><h3>🏆 Resumen</h3><p style="font-size:13px;line-height:1.7;"><strong>Más proteína:</strong> '+masP.emoji+' '+masP.n+' ('+masP.p+'g vs '+(a1===masP?a2.p:a1.p)+'g)<br><strong>Menos calorías:</strong> '+menosK.emoji+' '+menosK.n+' ('+menosK.kcal+' kcal vs '+(a1===menosK?a2.kcal:a1.kcal)+' kcal)</p></div></div>';
  document.getElementById('detail').innerHTML=h;
}

  }
  var igLabel={'B':'Bajo 🟢','M':'Medio 🟡','A':'Alto 🔴'};

  if(!a.noMacros&&a.kcal>0){
    h+='<div class="macros-grid">';
    h+='<div class="macro-card" style="background:#1a1a1a;color:#fff;"><div class="macro-num">'+a.kcal+'</div><div class="macro-label">Calorías</div></div>';

    h+='<div class="macro-card" style="background:#27ae6022;"><div class="macro-num" style="color:#27ae60;">'+a.g+'<span class="macro-unit">g</span></div><div class="macro-label" style="color:#27ae60;">Grasas</div></div>';
    h+='</div><p style="font-size:10px;color:var(--gray3);margin-top:4px;">Valores por 100g</p>';
    h+='<div class="info-grid">';
    if(a.ig) h+='<div class="info-pill"><strong>Índice glucémico</strong>'+igLabel[a.ig]+'</div>';
    if(a.temp) h+='<div class="info-pill"><strong>Temporada</strong>'+a.temp+'</div>';
    if(a.como) h+='<div class="info-pill"><strong>Cómo cocinarlo</strong>'+a.como+'</div>';
    if(a.combina) h+='<div class="info-pill"><strong>Combina bien con</strong>'+a.combina+'</div>';
    h+='</div>';
  }
  if(a.info) h+='<div style="background:#fffbea;border:1px solid #f5c800;border-radius:8px;padding:10px 12px;margin-top:10px;font-size:12px;color:#7a6000;line-height:1.6;">'+a.info+'</div>';
  h+='</div>';

  if(a.para) h+='<div class="fsec"><h3>💪 Para qué sirve</h3><p>'+a.para+'</p></div>';
  if(a.supermercados&&a.supermercados.length){
    h+='<div class="fsec"><h3>🛒 Dónde comprarlo</h3>';

  var data=type==='alcohol'?ALCOHOL:NOCHE;
  var title=type==='alcohol'?'🍺 Alcohol y el programa':'🌙 Comer por la noche';
  var h='<div class="card"><div class="food-header"><h1 style="font-size:18px;font-weight:800;">'+title+'</h1></div>';
  data.forEach(function(d){h+='<div class="section-full"><h2>'+d.titulo+'</h2><p style="font-size:13px;line-height:1.7;">'+d.contenido.replace(/\n/g,'<br>')+'</p></div>';});
  h+='</div>';
  document.getElementById('detail').innerHTML=h;
}

function showInfoItem(type,i){renderInfo(type);}

function showConsejo(id){
  document.getElementById('list').classList.remove('open');
  var c=CONSEJOS.find(function(x){return x.id===id;});
  if(!c)return;
  var h='<div class="card"><div class="food-header"><div style="font-size:32px;margin-bottom:6px;">'+c.emoji+'</div><h1 style="font-size:18px;font-weight:800;">'+c.titulo+'</h1></div>';
  c.contenido.forEach(function(item){h+='<div class="section-full"><h2>'+item.sub+'</h2><p style="font-size:13px;line-height:1.7;">'+item.texto.replace(/\n/g,'<br>')+'</p></div>';});
  h+='</div>';
  document.getElementById('detail').innerHTML=h;
}

function renderCompraView(){
  var labels={proteinas:'🥩 Proteínas',hidratos:'🍚 Hidratos',verduras:'🥦 Verduras',frutas:'🍎 Frutas',grasas:'🥑 Grasas',extras:'🧂 Extras'};
  var h='<div class="card"><div class="food-header"><div style="font-size:32px;margin-bottom:6px;">🛒</div><h1 style="font-size:18px;font-weight:800;">Lista de la compra HSB</h1><p style="font-size:13px;color:var(--gray3);margin-top:4px;">Lo que Diego recomienda tener siempre en casa.</p></div>';
  Object.keys(COMPRA).forEach(function(k){
    h+='<div class="compra-cat"><h3>'+labels[k]+'</h3><div class="compra-grid">';
    COMPRA[k].forEach(function(item){h+='<span class="compra-pill">'+item+'</span>';});
    h+='</div></div>';
  });
  h+='<div style="background:#fffbea;border:1px solid #f5c800;border-radius:10px;padding:14px;margin-top:4px;"><p style="font-size:12px;color:#7a6000;line-height:1.6;"><strong>💡 Consejo de Diego:</strong> Compra una vez a la semana y cocina en batch el domingo. Así durante la semana solo calientas y combinas.</p></div></div>';
  document.getElementById('detail').innerHTML=h;
}

function onSearch(){if(viewMode==='alimentos')renderList();}
document.getElementById('mobile-menu-btn').onclick=function(){document.getElementById('list').classList.toggle('open');};
renderSidebar();renderList();
</script>
</body>
</html>
