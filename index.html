<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HSB — Biblioteca de Ejercicios</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#d4001a;--black:#0a0a0a;--white:#fff;--gray:#f5f5f5;--gray2:#e8e8e8;--gray3:#888;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--gray);color:var(--black);-webkit-font-smoothing:antialiased;}

/* HEADER */
.header{background:var(--black);padding:0 20px;border-bottom:2px solid var(--red);position:sticky;top:0;z-index:100;}
.header-inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;height:52px;gap:12px;}
.header-logo{font-weight:900;font-size:18px;color:#fff;letter-spacing:-0.5px;}
.header-logo span{color:var(--red);}
.header-sep{color:var(--red);font-weight:700;}
.header-title{color:#bbb;font-size:13px;font-weight:500;}
.header-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;}

/* MOBILE STRIP */
.mobile-strip{display:none;background:#141414;overflow-x:auto;padding:8px 12px;gap:6px;border-bottom:1px solid #2a2a2a;}
.mobile-strip-btn{background:#222;color:#aaa;border:none;border-radius:20px;padding:5px 12px;cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;font-family:inherit;}
.mobile-strip-btn.active{background:var(--red);color:#fff;}
.mobile-strip-equip{background:transparent;color:#888;border:1px solid #333;border-radius:20px;padding:5px 12px;cursor:pointer;font-size:11px;white-space:nowrap;flex-shrink:0;font-family:inherit;}
.mobile-strip-equip.active{color:var(--red);border-color:var(--red);}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - 52px);}

/* SIDEBAR */
.sidebar{width:162px;background:#141414;padding:10px 7px;display:flex;flex-direction:column;gap:2px;flex-shrink:0;overflow-y:auto;}
.sidebar-label{color:#555;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin:4px 8px 6px;}
.sidebar-btn{background:transparent;color:#999;border:none;border-radius:6px;padding:8px 10px;cursor:pointer;text-align:left;font-size:12px;font-family:inherit;font-weight:400;transition:all .15s;width:100%;}
.sidebar-btn.active{background:var(--red);color:#fff;font-weight:700;}
.sidebar-div{border-top:1px solid #2a2a2a;margin:6px 4px;}
.sidebar-equip{background:transparent;color:#888;border:1px solid transparent;border-radius:6px;padding:7px 10px;cursor:pointer;text-align:left;font-size:12px;font-family:inherit;font-weight:400;transition:all .15s;width:100%;}
.sidebar-equip.active{color:var(--red);border-color:#d4001a44;font-weight:600;}
.sidebar-warmup{background:transparent;color:#777;border:1px solid transparent;border-radius:6px;padding:8px 10px;cursor:pointer;text-align:left;font-size:12px;font-family:inherit;font-weight:600;margin-top:4px;transition:all .15s;width:100%;}
.sidebar-warmup.active{background:#d4001a18;color:var(--red);border-color:#d4001a33;}

/* LIST */
.list{width:210px;background:#fff;border-right:1px solid var(--gray2);display:flex;flex-direction:column;flex-shrink:0;}
.list-tabs{display:flex;border-bottom:1px solid var(--gray2);}
.list-tab{flex:1;padding:9px 0;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;font-size:11px;font-weight:700;color:var(--gray3);font-family:inherit;transition:all .15s;}
.list-tab.active{color:var(--red);border-bottom-color:var(--red);}
.list-search{padding:10px;border-bottom:1px solid var(--gray2);}
.list-search input{width:100%;font-size:12px;padding:6px 9px;border-radius:6px;border:1px solid var(--gray2);font-family:inherit;outline:none;background:var(--gray);}
.list-levels{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap;}
.list-levels button{font-size:10px;padding:3px 7px;border-radius:20px;border:none;cursor:pointer;font-family:inherit;font-weight:600;}
.list-count{font-size:10px;color:var(--gray3);margin-top:4px;}
.list-items{overflow-y:auto;flex:1;}
.list-item{display:flex;align-items:center;justify-content:space-between;width:100%;padding:9px 12px;background:transparent;border:none;border-bottom:1px solid var(--gray2);cursor:pointer;text-align:left;font-size:12px;line-height:1.4;color:var(--black);font-family:inherit;gap:6px;transition:background .1s;}
.list-item.active{background:var(--red);color:#fff;}
.list-item .lvl{font-size:9px;font-weight:700;padding:2px 5px;border-radius:8px;flex-shrink:0;}

/* DETAIL */
.detail{flex:1;overflow-y:auto;padding:20px 24px;background:var(--gray);}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;opacity:.3;}
.spinner{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem;gap:12px;}
.spin{width:30px;height:30px;border:3px solid var(--gray2);border-top:3px solid var(--red);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* CARD */
.card{max-width:680px;}
.card-header{display:flex;gap:16px;align-items:flex-start;margin-bottom:14px;padding:16px;background:#fff;border:1px solid var(--gray2);border-radius:12px;flex-wrap:wrap;}
.card-body{flex:1;min-width:160px;}
.card-title{font-size:18px;font-weight:800;color:var(--black);margin:0 0 8px;line-height:1.2;}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;}
.muscles-title{font-size:9px;color:var(--gray3);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin:0 0 4px;}
.muscles-row{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px;}
.muscle-pill{font-size:10px;padding:2px 8px;border-radius:12px;font-weight:500;}

/* VIDEO */
.video-section{background:#fff;border:1px solid var(--gray2);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.video-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--gray2);}
.video-title-bar{font-size:11px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:1px;}
.video-wrap{aspect-ratio:16/9;background:#000;}
.video-wrap iframe{width:100%;height:100%;border:none;}
.video-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;cursor:pointer;background:#111;min-height:200px;}
.video-placeholder-icon{width:52px;height:52px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;}
.video-placeholder-icon::after{content:'';border-left:18px solid #fff;border-top:11px solid transparent;border-bottom:11px solid transparent;margin-left:5px;}
.video-placeholder p{color:#888;font-size:12px;}

/* SECTIONS */
.section{background:#fff;border:1px solid var(--gray2);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:0 0 12px;}
.step{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;}
.step-num{min-width:22px;height:22px;background:var(--red);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}
.step-text{font-size:13px;color:var(--black);margin:0;line-height:1.6;}
.tip{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
.tip-arrow{color:var(--red);font-size:14px;flex-shrink:0;line-height:1;margin-top:3px;}
.tip-text{font-size:13px;color:var(--black);margin:0;line-height:1.6;}
.err{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
.err-x{color:#a32d2d;font-size:13px;flex-shrink:0;line-height:1;margin-top:3px;}
.err-text{font-size:13px;color:var(--black);margin:0;line-height:1.6;}

/* WARMUP */
.warmup-item{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px;padding:10px 12px;background:#fff;border-radius:8px;border:1px solid var(--gray2);}
.warmup-num{min-width:20px;height:20px;background:var(--red);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}

/* ANATOMY */
.anatomy{display:flex;flex-direction:column;align-items:center;gap:4px;}
.anatomy-views{display:flex;gap:10px;align-items:flex-end;}
.anatomy-label{font-size:8px;color:var(--gray3);font-weight:700;text-transform:uppercase;letter-spacing:.8px;text-align:center;}
.anatomy-legend{display:flex;align-items:center;gap:4px;margin-top:2px;}
.anatomy-dot{width:8px;height:8px;border-radius:2px;background:var(--red);}

/* MOBILE */
.mobile-menu-btn{display:none;background:var(--red);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;margin-left:auto;}
@media(max-width:700px){
  .sidebar{display:none;}
  .mobile-strip{display:flex;}
  .mobile-menu-btn{display:block;}
  .list{position:fixed;left:0;top:52px;bottom:0;z-index:50;display:none;width:240px;box-shadow:4px 0 20px rgba(0,0,0,.2);}
  .list.open{display:flex;}
  .detail{padding:14px;}
  .card-header{flex-direction:column;}
}
</style>
</head>

var grp='pecho',equip='libre',level='Todos',view='ejercicios',selEx=null;

function getVideoId(name){
  // Busca coincidencia exacta primero
  if(VIDEOS[name]) return VIDEOS[name];
  // Luego busca parcial
  var keys=Object.keys(VIDEOS);
  for(var i=0;i<keys.length;i++){
    if(name.toLowerCase().indexOf(keys[i].toLowerCase())!==-1||keys[i].toLowerCase().indexOf(name.toLowerCase())!==-1){
      return VIDEOS[keys[i]];
    }
  }
  return null;
}

function renderSidebar(){
  var sb=document.getElementById('sidebar');
  var h='<div class="sidebar-label">Grupo muscular</div>';
  GROUPS.forEach(function(g){
    h+='<button class="sidebar-btn'+(grp===g.id?' active':'')+'" onclick="setGroup(\''+g.id+'\')" >'+g.label+'</button>';
  });
  h+='<div class="sidebar-div"></div>';
  h+='<div class="sidebar-label">Equipamiento</div>';
  EQUIP.forEach(function(e){
    h+='<button class="sidebar-equip'+(equip===e.id?' active':'')+'" onclick="setEquip(\''+e.id+'\')">'+e.label+'</button>';
  });
  h+='<div class="sidebar-div"></div>';
  h+='<button class="sidebar-warmup'+(view==='warmup'?' active':'')+'" onclick="setView(\'warmup\')">🔥 Calentamiento</button>';
  sb.innerHTML=h;
}

function renderMobileStrip(){
  var strip=document.getElementById('mobile-strip');
  var h='';
  GROUPS.forEach(function(g){
    h+='<button class="mobile-strip-btn'+(grp===g.id?' active':'')+'" onclick="setGroup(\''+g.id+'\')">'+g.label+'</button>';
  });
  h+='<div style="width:1px;background:#333;margin:0 4px;flex-shrink:0;"></div>';
  EQUIP.forEach(function(e){
    h+='<button class="mobile-strip-equip'+(equip===e.id?' active':'')+'" onclick="setEquip(\''+e.id+'\')">'+e.label+'</button>';
  });
  strip.innerHTML=h;
}

function renderList(){
  var s=document.getElementById('search');
  var search=s?s.value.toLowerCase():'';
  var exs=(DB[grp]&&DB[grp][equip])||[];
  var wl=exs.map(function(e,i){return{name:e,level:LVL_PAT[i]||'Intermedio'};});
  var fl=wl.filter(function(e){return(level==='Todos'||e.level===level)&&e.name.toLowerCase().indexOf(search)!==-1;});
  var lh='';
  LEVELS.forEach(function(l){
    var act=level===l;
    var bg=act?(l==='Todos'?'#333':LVL_BG[l]):'#f0f0f0';
    var col=act?(l==='Todos'?'#fff':LVL_C[l]):'#888';
    var bor=act&&l!=='Todos'?'1px solid '+LVL_C[l]+'44':'1px solid transparent';
    lh+='<button onclick="setLevel(\''+l+'\')" style="font-size:10px;padding:3px 7px;border-radius:20px;border:'+bor+';cursor:pointer;font-family:inherit;font-weight:600;background:'+bg+';color:'+col+';">'+(l==='Todos'?'Todos':l.slice(0,5)+'.')+'</button>';
  });
  document.getElementById('levels').innerHTML=lh;
  document.getElementById('count').textContent=fl.length+' ejercicios';
  var h='';
  fl.forEach(function(ex){
    var act=selEx===ex.name;
    var lc=LVL_C[ex.level];var lb=LVL_BG[ex.level];
    var hasVideo=getVideoId(ex.name)?'▶ ':'';
    h+='<button class="list-item'+(act?' active':'')+'" onclick="loadEx(\''+ex.name.replace(/'/g,'')+'\',\''+ex.level+'\')">';
    h+='<span>'+hasVideo+ex.name+'</span>';
    h+='<span class="lvl" style="background:'+(act?'rgba(255,255,255,0.25)':lb)+';color:'+(act?'#fff':lc)+';">'+ex.level.slice(0,3).toUpperCase()+'</span>';
    h+='</button>';
  });
  document.getElementById('list-items').innerHTML=h||'<div style="padding:2rem;text-align:center;font-size:13px;color:var(--gray3);">Sin resultados</div>';
}

function renderWarmup(){
  document.getElementById('search-wrap').style.display='none';
  var wus=WARMUPS[grp]||[];
  var gl=GROUPS.find(function(g){return g.id===grp;}).label;
  var h='<div style="padding:12px;border-bottom:1px solid var(--gray2);"><p style="font-size:11px;color:var(--gray3);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;">Calentamiento — '+gl+'</p>';
  wus.forEach(function(w,i){
    h+='<div class="warmup-item"><span class="warmup-num">'+(i+1)+'</span><p style="font-size:12.5px;color:var(--black);margin:0;line-height:1.5;">'+w+'</p></div>';
  });
  h+='<p style="font-size:11px;color:var(--gray3);margin-top:6px;line-height:1.5;">Realiza este calentamiento antes de entrenar '+gl.toLowerCase()+' para activar la zona y prevenir lesiones.</p></div>';
  document.getElementById('list-items').innerHTML=h;
}

function setGroup(g){grp=g;selEx=null;renderSidebar();renderMobileStrip();if(view==='ejercicios'){document.getElementById('search-wrap').style.display='block';renderList();}else renderWarmup();showEmpty();}
function setEquip(e){equip=e;selEx=null;renderSidebar();renderMobileStrip();if(view==='ejercicios')renderList();showEmpty();}
function setLevel(l){level=l;renderList();}
function setView(v){
  view=v;
  document.getElementById('tab-ej').classList.toggle('active',v==='ejercicios');
  document.getElementById('tab-wu').classList.toggle('active',v==='warmup');
  renderSidebar();
  if(v==='ejercicios'){document.getElementById('search-wrap').style.display='block';renderList();}
  else{document.getElementById('search-wrap').style.display='none';renderWarmup();}
}

function showEmpty(){
  document.getElementById('detail').innerHTML='<div class="empty"><div style="font-size:40px;">🏋️</div><p style="font-size:14px;color:var(--gray3);text-align:center;">Selecciona un ejercicio<br>para ver los detalles</p></div>';
}

function buildVideoSection(name){
  var vid=getVideoId(name);
  if(!vid){
    return '<div class="video-section"><div class="video-header"><span class="video-title-bar">Video del ejercicio</span></div><div class="video-wrap"><div class="video-placeholder"><div class="video-placeholder-icon"></div><p>Vídeo no disponible para este ejercicio</p></div></div></div>';
  }
  return '<div class="video-section"><div class="video-header"><span class="video-title-bar">▶ Video del ejercicio</span></div><div class="video-wrap"><iframe src="https://www.youtube.com/embed/'+vid+'?rel=0&modestbranding=1" allowfullscreen></iframe></div></div>';
}

async function loadEx(name,lv){
  selEx=name;renderList();
  document.getElementById('list').classList.remove('open');
  document.getElementById('detail').innerHTML='<div class="spinner"><div class="spin"></div><span style="font-size:13px;color:var(--gray3);">Cargando...</span></div>';
  try{
    var eL={libre:'peso libre',maquina:'maquina',polea:'polea'};
    var gL={pecho:'pecho',espalda:'espalda',hombros:'hombros',biceps:'biceps',triceps:'triceps',piernas:'piernas',gluteos:'gluteos',core:'core/abdominales'};
    var prompt='Eres un entrenador personal experto. Dame informacion del ejercicio "'+name+'" (grupo: '+gL[grp]+', equipo: '+eL[equip]+', nivel: '+lv+').\nResponde SOLO con JSON valido sin markdown:\n{"nombre":"'+name+'","nivel":"'+lv+'","musculos_principales":["m1"],"musculos_secundarios":["m1"],"tecnica":["Paso 1","Paso 2","Paso 3","Paso 4","Paso 5"],"consejos":["C1","C2","C3"],"errores_comunes":["E1","E2"]}';
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    var data=await res.json();
    var text=(data.content||[]).map(function(i){return i.text||'';}).join('');
    var d=JSON.parse(text.replace(/```json|```/g,'').trim());
    var gl=GROUPS.find(function(g){return g.id===grp;}).label;
    var el=EQUIP.find(function(e){return e.id===equip;}).label;
    var h='<div class="card">';
    // HEADER
    h+='<div class="card-header">';
    h+=getAnatomy(grp);
    h+='<div class="card-body">';
    h+='<h1 class="card-title">'+d.nombre+'</h1>';
    h+='<div class="badges">';
    h+='<span class="badge" style="background:var(--red);color:#fff;">'+gl+'</span>';
    h+='<span class="badge" style="background:#f0f0f0;color:#555;border:1px solid var(--gray2);">'+el+'</span>';
    if(d.nivel) h+='<span class="badge" style="background:'+LVL_BG[d.nivel]+';color:'+LVL_C[d.nivel]+';border:1px solid '+LVL_C[d.nivel]+'44;">'+d.nivel+'</span>';
    h+='</div>';
    if(d.musculos_principales&&d.musculos_principales.length){
      h+='<p class="muscles-title">Principales</p><div class="muscles-row">';
      d.musculos_principales.forEach(function(m){h+='<span class="muscle-pill" style="background:var(--red);color:#fff;">'+m+'</span>';});
      h+='</div>';
    }
    if(d.musculos_secundarios&&d.musculos_secundarios.length){
      h+='<p class="muscles-title" style="margin-top:4px;">Secundarios</p><div class="muscles-row">';
      d.musculos_secundarios.forEach(function(m){h+='<span class="muscle-pill" style="background:#f0f0f0;color:#555;border:1px solid var(--gray2);">'+m+'</span>';});
      h+='</div>';
    }
    h+='</div></div>';
    // VIDEO
    h+=buildVideoSection(name);
    // TECNICA
    h+='<div class="section"><h2 class="section-title" style="color:var(--red);">Tecnica de ejecucion</h2>';
    (d.tecnica||[]).forEach(function(s,i){h+='<div class="step"><span class="step-num">'+(i+1)+'</span><p class="step-text">'+s+'</p></div>';});
    h+='</div>';
    // CONSEJOS
    h+='<div class="section"><h2 class="section-title" style="color:var(--red);">Consejos clave</h2>';
    (d.consejos||[]).forEach(function(t){h+='<div class="tip"><span class="tip-arrow">→</span><p class="tip-text">'+t+'</p></div>';});
    h+='</div>';
    // ERRORES
    if(d.errores_comunes&&d.errores_comunes.length){
      h+='<div class="section" style="background:#fff8f8;border-color:#ffdddd;"><h2 class="section-title" style="color:#a32d2d;">Errores comunes</h2>';
      d.errores_comunes.forEach(function(e){h+='<div class="err"><span class="err-x">✕</span><p class="err-text">'+e+'</p></div>';});
      h+='</div>';
    }
    h+='</div>';
    document.getElementById('detail').innerHTML=h;
  }catch(e){
    document.getElementById('detail').innerHTML='<div style="text-align:center;padding:2rem;color:var(--gray3);"><p style="margin-bottom:12px;">Error al cargar. Intentalo de nuevo.</p><button onclick="loadEx(\''+name+'\',\''+lv+'\')" style="background:var(--black);color:#fff;border:none;padding:9px 18px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;">Reintentar</button></div>';
  }
}

};

renderSidebar();renderMobileStrip();renderList();
