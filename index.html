<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HSB — Biblioteca de Ejercicios</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#d4001a;--black:#0a0a0a;--white:#fff;--gray:#f5f5f5;--gray2:#e8e8e8;--gray3:#888;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--gray);color:var(--black);-webkit-font-smoothing:antialiased;}
.header{background:var(--black);padding:0 20px;border-bottom:2px solid var(--red);position:sticky;top:0;z-index:100;}
.header-inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;height:52px;gap:12px;}
.header-logo{font-weight:900;font-size:18px;color:#fff;letter-spacing:-0.5px;}
.header-logo span{color:var(--red);}
.header-title{color:#bbb;font-size:13px;font-weight:500;}
.header-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;}
.mobile-strip{display:none;background:#141414;overflow-x:auto;padding:8px 12px;gap:6px;border-bottom:1px solid #2a2a2a;}
.layout{display:flex;height:calc(100vh - 52px);}
.sidebar{width:162px;background:#141414;padding:10px 7px;display:flex;flex-direction:column;gap:2px;flex-shrink:0;overflow-y:auto;}
.sidebar-label{color:#555;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;margin:4px 8px 6px;}
.sidebar-btn{background:transparent;color:#999;border:none;border-radius:6px;padding:8px 10px;cursor:pointer;text-align:left;font-size:12px;font-family:inherit;font-weight:400;transition:all .15s;width:100%;}
.sidebar-btn.active{background:var(--red);color:#fff;font-weight:700;}
.sidebar-div{border-top:1px solid #2a2a2a;margin:6px 4px;}
.sidebar-equip{background:transparent;color:#888;border:1px solid transparent;border-radius:6px;padding:7px 10px;cursor:pointer;text-align:left;font-size:12px;font-family:inherit;font-weight:400;transition:all .15s;width:100%;}
.sidebar-equip.active{color:var(--red);border-color:#d4001a44;font-weight:600;}
.sidebar-warmup{background:transparent;color:#777;border:1px solid transparent;border-radius:6px;padding:8px 10px;cursor:pointer;text-align:left;font-size:12px;font-family:inherit;font-weight:600;margin-top:4px;transition:all .15s;width:100%;}
.sidebar-warmup.active{background:#d4001a18;color:var(--red);border-color:#d4001a33;}
.list{width:210px;background:#fff;border-right:1px solid var(--gray2);display:flex;flex-direction:column;flex-shrink:0;}
.list-tabs{display:flex;border-bottom:1px solid var(--gray2);}
.list-tab{flex:1;padding:9px 0;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;font-size:11px;font-weight:700;color:var(--gray3);font-family:inherit;}
.list-tab.active{color:var(--red);border-bottom-color:var(--red);}
.list-search{padding:10px;border-bottom:1px solid var(--gray2);}
.list-search input{width:100%;font-size:12px;padding:6px 9px;border-radius:6px;border:1px solid var(--gray2);font-family:inherit;outline:none;background:var(--gray);}
.list-levels{display:flex;gap:3px;margin-top:6px;flex-wrap:wrap;}
.list-count{font-size:10px;color:var(--gray3);margin-top:4px;}
.list-items{overflow-y:auto;flex:1;}
.list-item{display:flex;align-items:center;justify-content:space-between;width:100%;padding:9px 12px;background:transparent;border:none;border-bottom:1px solid var(--gray2);cursor:pointer;text-align:left;font-size:12px;line-height:1.4;color:var(--black);font-family:inherit;gap:6px;transition:background .1s;}
.list-item.active{background:var(--red);color:#fff;}
.lvl{font-size:9px;font-weight:700;padding:2px 5px;border-radius:8px;flex-shrink:0;}
.detail{flex:1;overflow-y:auto;padding:20px 24px;background:var(--gray);}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;opacity:.3;}
.card{max-width:680px;}
.card-header{display:flex;gap:16px;align-items:flex-start;margin-bottom:14px;padding:16px;background:#fff;border:1px solid var(--gray2);border-radius:12px;flex-wrap:wrap;}
.card-body{flex:1;min-width:160px;}
.card-title{font-size:18px;font-weight:800;color:var(--black);margin:0 0 8px;line-height:1.2;}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;}
.muscles-title{font-size:9px;color:var(--gray3);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin:0 0 4px;}
.muscles-row{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px;}
.muscle-pill{font-size:10px;padding:2px 8px;border-radius:12px;font-weight:500;}
.section{background:#fff;border:1px solid var(--gray2);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin:0 0 12px;}
.step{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;}
.step-num{min-width:22px;height:22px;background:var(--red);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}
.step-text,.tip-text,.err-text{font-size:13px;color:var(--black);margin:0;line-height:1.6;}
.tip{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
.tip-arrow{color:var(--red);font-size:14px;flex-shrink:0;line-height:1;margin-top:3px;}
.err{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start;}
.err-x{color:#a32d2d;font-size:13px;flex-shrink:0;line-height:1;margin-top:3px;}
.warmup-item{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px;padding:10px 12px;background:#fff;border-radius:8px;border:1px solid var(--gray2);}
.warmup-num{min-width:20px;height:20px;background:var(--red);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.anatomy{display:flex;flex-direction:column;align-items:center;gap:4px;}
.anatomy-views{display:flex;gap:10px;align-items:flex-end;}
.anatomy-label{font-size:8px;color:var(--gray3);font-weight:700;text-transform:uppercase;letter-spacing:.8px;text-align:center;}
.anatomy-legend{display:flex;align-items:center;gap:4px;margin-top:2px;}
.anatomy-dot{width:8px;height:8px;border-radius:2px;background:var(--red);}
.mobile-menu-btn{display:none;background:var(--red);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;margin-left:auto;}
@media(max-width:700px){
  .sidebar{display:none;}
  .mobile-strip{display:flex;}
  .mobile-menu-btn{display:block;}
  .list{position:fixed;left:0;top:52px;bottom:0;z-index:50;display:none;width:240px;box-shadow:4px 0 20px rgba(0,0,0,.2);}
  .list.open{display:flex;}
  .detail{padding:14px;}
}
</style>

<div class="header">

    <div class="header-logo">HSB <span>|</span></div>

<div class="mobile-strip" id="mobile-strip"></div>
<div class="layout">

</div>

var CONTENT = {
  // ===== PECHO =====
  'Press banca plano con barra':{mp:['Pectoral mayor','Pectoral menor'],ms:['Deltoides anterior','Tríceps'],nivel:'Principiante',tecnica:['Túmbate en el banco con los pies apoyados en el suelo y la espalda en posición neutra.','Agarra la barra con un agarre ligeramente más ancho que los hombros, palmas mirando hacia los pies.','Desrack la barra y bájala de forma controlada hasta rozar el pecho a la altura de los pezones.','Empuja la barra hacia arriba describiendo una leve curva, sin bloquear completamente los codos.','Controla la fase excéntrica durante al menos 2 segundos antes de cada repetición.'],consejos:['Mantén los omóplatos retraídos y deprimidos durante todo el movimiento para proteger los hombros.','Los pies deben estar firmemente apoyados en el suelo para generar base estable.','Usa el arco lumbar natural, sin exagerarlo; la zona lumbar no debe despegarse completamente del banco.'],errores:['Rebotar la barra en el pecho en lugar de controlar la bajada.','Levantar los pies del suelo, lo que desestabiliza el movimiento.']},
  'Press banca inclinado con barra':{mp:['Pectoral mayor porción clavicular','Deltoides anterior'],ms:['Tríceps','Serratos'],nivel:'Principiante',tecnica:['Ajusta el banco a 30-45 grados. Siéntate y apoya la espalda completamente.','Agarra la barra con agarre más ancho que los hombros y desrackea.','Baja la barra de forma controlada hacia la parte alta del pecho, a la altura de la clavícula.','Empuja la barra hacia arriba y ligeramente hacia atrás para mantener la trayectoria correcta.','Evita bloquear los codos al final de la extensión.'],consejos:['Un ángulo de 30° activa más el pectoral; 45° implica más deltoides anterior.','Mantén los omóplatos juntos para proteger la articulación glenohumeral.','El agarre no debe ser excesivamente ancho para no sobrecargar los hombros.'],errores:['Usar un banco demasiado inclinado, trasladando el trabajo al deltoides.','No controlar la fase negativa del movimiento.']},
  'Press banca plano con mancuernas':{mp:['Pectoral mayor'],ms:['Deltoides anterior','Tríceps','Serratos'],nivel:'Principiante',tecnica:['Siéntate al borde del banco, coloca las mancuernas sobre los muslos y recuéstate llevándolas a los lados del pecho.','Parte con los codos a 90° y las mancuernas a la altura del pecho, paralelas entre sí.','Empuja hacia arriba extendiendo los brazos sin bloquear los codos en la cima.','Baja de forma controlada, sintiendo el estiramiento del pectoral en la parte baja.','Mantén las muñecas neutras y alineadas con el antebrazo durante todo el recorrido.'],consejos:['Las mancuernas permiten mayor rango de movimiento que la barra, aprovéchalo bajando un poco más.','No juntes excesivamente las mancuernas en la cima para mantener tensión en el pectoral.','Controla la fase excéntrica para maximizar la hipertrofia.'],errores:['Dejar caer las mancuernas bruscamente al bajar.','Rotar las muñecas hacia afuera, lo que sobrecarga la articulación.']},
  'Aperturas en banco plano':{mp:['Pectoral mayor'],ms:['Deltoides anterior','Bíceps braquial'],nivel:'Intermedio',tecnica:['Túmbate en el banco con una mancuerna en cada mano, brazos extendidos sobre el pecho con codos ligeramente flexionados.','Abre los brazos en arco hacia los lados manteniendo la leve flexión de codos constante.','Baja hasta sentir un estiramiento en el pectoral, sin forzar el hombro.','Vuelve a la posición inicial juntando las mancuernas siguiendo el mismo arco.','Imagina que estás abrazando un gran árbol durante todo el movimiento.'],consejos:['El movimiento es de apertura y cierre, no de press; no cambies el ángulo del codo.','Usa un peso moderado para priorizar el rango de movimiento sobre la carga.','El estiramiento controlado en la parte baja potencia la activación muscular.'],errores:['Usar demasiado peso y perder la forma del ejercicio.','Extender completamente el codo, convirtiendo el ejercicio en un press.']},
  'Dips en paralelas':{mp:['Pectoral mayor porción inferior','Tríceps'],ms:['Deltoides anterior','Serratos'],nivel:'Intermedio',tecnica:['Apóyate en las barras paralelas con los brazos extendidos y el cuerpo en vertical.','Inclina ligeramente el tronco hacia adelante para enfatizar el trabajo del pectoral.','Baja flexionando los codos hasta que los hombros estén por debajo de los codos.','Sube empujando con fuerza hasta casi extender los brazos, sin bloquear completamente.','Mantén el core activo y controla el movimiento durante todo el recorrido.'],consejos:['A mayor inclinación del torso, más implicación del pectoral inferior.','Si el ejercicio resulta difícil, usa una banda elástica como asistencia.','Añade peso con un cinturón lastrado cuando el peso corporal ya no suponga un reto.'],errores:['Bajar excesivamente y sobrecargar el hombro anterior.','No inclinar el torso y hacer el ejercicio principalmente de tríceps.']},
  'Pullover con mancuerna':{mp:['Pectoral mayor porción esternal','Dorsal ancho'],ms:['Tríceps','Serratos','Intercostales'],nivel:'Intermedio',tecnica:['Túmbate transversalmente en un banco con solo la parte superior de la espalda apoyada.','Sujeta una mancuerna con ambas manos por debajo del disco superior, con los codos ligeramente flexionados.','Baja la mancuerna hacia atrás por encima de la cabeza describiendo un arco, hasta sentir el estiramiento.','Tira hacia adelante con el pecho y los dorsales para volver a la posición inicial.','Mantén las caderas un poco más bajas que el banco para mayor rango de movimiento.'],consejos:['Este ejercicio es excepcional para expandir la caja torácica con respiraciones profundas.','Enfoca mentalmente en el pectoral en la fase de regreso y en el dorsal en la fase de bajada.','Usa un peso moderado para priorizar el rango de movimiento.'],errores:['Doblar demasiado los codos, convirtiendo el ejercicio en una extensión de tríceps.','Levantar las caderas durante el movimiento, perdiendo estabilidad.']},
  'Peck deck Mariposa':{mp:['Pectoral mayor'],ms:['Deltoides anterior'],nivel:'Principiante',tecnica:['Ajusta el asiento para que los codos queden a la altura de los hombros al sujetar las almohadillas.','Siéntate con la espalda completamente apoyada en el respaldo y el pecho ligeramente elevado.','Junta los codos describiendo un arco, sintiendo la contracción máxima del pectoral en el centro.','Vuelve hacia atrás de forma controlada hasta sentir el estiramiento, sin hiperextender.','Mantén los hombros bajos y alejados de las orejas durante todo el movimiento.'],consejos:['Aguanta 1-2 segundos en el punto de máxima contracción para aumentar el estímulo.','No uses el impulso del torso para mover las almohadillas.','Regula la posición del asiento para sentir el trabajo principalmente en el pectoral y no en el hombro.'],errores:['Dejar que los codos suban por encima de los hombros al abrir.','Usar demasiado peso y perder el control en la fase excéntrica.']},
  'Cruce poleas alto':{mp:['Pectoral mayor porción inferior'],ms:['Deltoides anterior','Serratos'],nivel:'Principiante',tecnica:['Coloca las poleas en la posición más alta. Coge las asas y da un paso al frente para crear tensión.','Parte con los brazos en X abiertos y ligeramente flexionados, con el torso inclinado hacia adelante.','Lleva ambas asas hacia abajo y al centro cruzándolas ligeramente, contrayendo el pectoral.','Vuelve de forma controlada a la posición inicial sin perder tensión en el cable.','Mantén el core activo y la espalda en posición neutra durante todo el recorrido.'],consejos:['La altura de la polea determina qué porción del pectoral se trabaja: alta=inferior, baja=superior.','Mantén los codos en ligera flexión constante para reducir la carga en la articulación.','Alterna el brazo que queda por encima en cada repetición.'],errores:['Abrir demasiado los brazos y sobrecargar el hombro anterior.','Enderezar el torso, lo que cambia la dirección de la fuerza.']},
  // ESPALDA
  'Peso muerto convencional':{mp:['Isquiotibiales','Glúteo mayor','Erectores espinales'],ms:['Cuádriceps','Trapecios','Dorsales','Core'],nivel:'Principiante',tecnica:['Colócate de pie con los pies a la anchura de las caderas, puntas ligeramente hacia afuera, barra sobre el mediopié.','Baja flexionando cadera y rodillas, agarra la barra con agarre prono o mixto justo fuera de las piernas.','Activa el core, saca pecho y lleva los omóplatos ligeramente juntos antes de tirar.','Empuja el suelo con los pies mientras extiendes caderas y rodillas simultáneamente.','Mantén la barra pegada al cuerpo en todo momento durante el ascenso y el descenso.'],consejos:['La barra debe quedar sobre el mediopié antes de tirar, ni demasiado lejos ni demasiado cerca.','Piensa en "empujar el suelo" en lugar de "tirar de la barra" para activar bien los glúteos.','La espalda debe mantenerse en posición neutra; nunca en flexión durante la carga.'],errores:['Redondear la espalda lumbar al tirar, lo que puede causar lesiones graves.','Separar la barra del cuerpo durante el ascenso, aumentando el brazo de palanca.']},
  'Dominadas agarre ancho':{mp:['Dorsal ancho','Redondo mayor'],ms:['Bíceps braquial','Romboides','Trapecios medio'],nivel:'Intermedio',tecnica:['Agarra la barra con las manos más anchas que los hombros, palmas mirando hacia adelante.','Cuelga con los brazos completamente extendidos y activa el core para estabilizar el cuerpo.','Tira hacia arriba llevando los codos hacia atrás y abajo, llevando el pecho hacia la barra.','Sube hasta que la barbilla supere la barra o el pecho la toque.','Baja de forma completamente controlada hasta la extensión total de brazos.'],consejos:['Inicia el movimiento con la retracción de escápulas antes de doblar los codos.','Un agarre demasiado ancho reduce el rango de movimiento y aumenta el riesgo en el hombro.','Si no puedes hacer repeticiones completas, usa una banda elástica de asistencia.'],errores:['Usar el impulso del cuerpo (kipping) en lugar de la fuerza muscular.','No bajar hasta la extensión completa, recortando el rango de movimiento.']},
  'Remo con barra pronado':{mp:['Dorsal ancho','Romboides','Trapecios medio'],ms:['Bíceps','Deltoides posterior','Erectores espinales'],nivel:'Principiante',tecnica:['De pie, flexiona las rodillas ligeramente y baja el torso hasta casi horizontal, espalda neutra.','Agarra la barra con agarre prono (palmas hacia abajo) a la anchura de los hombros o algo más.','Tira de la barra hacia el abdomen bajo, llevando los codos hacia atrás y hacia arriba.','Contrae la escápula al llegar arriba y aguanta 1 segundo antes de bajar.','Baja la barra de forma controlada hasta la extensión completa de brazos.'],consejos:['Mantén el torso estático durante todo el movimiento; no uses el impulso de la espalda.','El punto de toque de la barra en el abdomen determina qué fibras del dorsal se activan más.','Un agarre supino activa más el bíceps; el prono activa más los romboides.'],errores:['Levantar el torso al tirar, convirtiendo el ejercicio en un encogimiento.','No llevar los codos suficientemente hacia atrás, reduciendo la activación del dorsal.']},
  'Jalon pecho agarre ancho':{mp:['Dorsal ancho','Redondo mayor'],ms:['Bíceps','Romboides','Trapecios'],nivel:'Principiante',tecnica:['Ajusta el rodillo sobre los muslos para fijar el cuerpo. Agarra la barra con agarre ancho prono.','Parte con los brazos completamente extendidos y el torso ligeramente inclinado hacia atrás.','Tira de la barra hacia el pecho alto llevando los codos hacia abajo y hacia los lados.','Cuando la barra llegue al pecho, contrae los dorsales y los romboides.','Vuelve de forma controlada a la extensión total de brazos.'],consejos:['La inclinación del torso determina el énfasis: más vertical activa más el dorsal superior.','No uses el impulso del cuerpo para bajar la barra; el movimiento debe ser estrictamente muscular.','Puedes llevar la barra hacia el pecho o al cuello según la movilidad y objetivo.'],errores:['Inclinar el torso excesivamente hacia atrás, convirtiendo el ejercicio en un remo.','Subir los hombros al tirar, no manteniendo las escápulas deprimidas.']},
  'Face pull':{mp:['Deltoides posterior','Romboides','Trapecios medio'],ms:['Manguito rotador','Bíceps'],nivel:'Principiante',tecnica:['Coloca la polea a la altura de la cara o ligeramente por encima. Usa una cuerda como agarre.','Agarra la cuerda con ambas manos en agarre neutro y da un paso atrás para crear tensión.','Tira de la cuerda hacia la cara, separando los extremos y llevando los codos hacia atrás.','En la posición final, los pulgares deben apuntar hacia atrás y los codos estar por encima de los hombros.','Vuelve de forma controlada sin dejar que los hombros se redondeen hacia adelante.'],consejos:['Este ejercicio es fundamental para la salud del hombro y la postura.','Realízalo con alta frecuencia y cargas moderadas para maximizar los beneficios.','Enfócate en la retracción escápular al final del movimiento.'],errores:['Tirar demasiado peso y perder la forma, activando el bíceps en exceso.','No llevar los codos suficientemente hacia atrás y no activar el deltoides posterior.']},
  // HOMBROS
  'Press militar barra de pie':{mp:['Deltoides anterior','Deltoides lateral'],ms:['Tríceps','Trapecio','Core'],nivel:'Principiante',tecnica:['De pie, agarra la barra a la anchura de los hombros o ligeramente más ancha, a la altura de la clavícula.','Activa el core y aprieta los glúteos para estabilizar la columna durante el press.','Empuja la barra hacia arriba describiendo una leve curva alrededor de la cabeza.','Extiende completamente los brazos en la cima y lleva la cabeza ligeramente hacia adelante.','Baja de forma controlada hasta la posición inicial a la altura de la clavícula.'],consejos:['Mantén las muñecas alineadas con los antebrazos para no sobrecargar la articulación.','Activa el core durante todo el movimiento para proteger la zona lumbar.','Evita arquear excesivamente la espalda para compensar la falta de fuerza.'],errores:['Arquear la espalda lumbar para completar las repeticiones.','No extender completamente los brazos arriba, recortando el recorrido.']},
  'Elevaciones laterales mancuernas':{mp:['Deltoides lateral'],ms:['Deltoides anterior','Trapecio','Supraespinoso'],nivel:'Principiante',tecnica:['De pie o sentado, con las mancuernas a los lados del cuerpo y una ligera flexión de codos.','Eleva los brazos lateralmente hasta que queden paralelos al suelo, no más.','En la posición elevada, el meñique debe estar ligeramente más alto que el pulgar (como vaciando una botella).','Baja de forma controlada, sin dejar caer las mancuernas.','Mantén el torso estático; no te inclines ni uses el impulso del cuerpo.'],consejos:['Usa cargas relativamente ligeras para priorizar la calidad del movimiento.','La ligera inclinación del pulgar hacia abajo maximiza la activación del deltoides lateral.','Realiza el ejercicio con una pausa de 1 segundo en la posición elevada.'],errores:['Usar el impulso del torso para subir las mancuernas.','Elevar los brazos por encima del paralelo, sobrecargando el manguito rotador.']},
  'Press Arnold':{mp:['Deltoides anterior','Deltoides lateral','Deltoides posterior'],ms:['Tríceps','Trapecio'],nivel:'Intermedio',tecnica:['Siéntate con las mancuernas a la altura del pecho, palmas mirando hacia ti (posición de curl).','Comienza a empujar hacia arriba rotando las muñecas de forma que al llegar arriba las palmas miren hacia adelante.','Extiende los brazos completamente en la cima con las palmas mirando hacia adelante.','Al bajar, invierte la rotación: las palmas van girando hacia ti a medida que bajas.','El movimiento completo de rotación debe ocurrir durante todo el rango de presión.'],consejos:['La rotación del antebrazo activa los tres haces del deltoides en un solo ejercicio.','Realiza el movimiento de forma fluida y coordinada, no en dos fases separadas.','Usa un peso que te permita mantener la rotación completa en todas las repeticiones.'],errores:['Hacer la rotación solo al principio o al final, sin integrarla en todo el recorrido.','Arquear la espalda al empujar, especialmente con cargas pesadas.']},
  // BICEPS
  'Curl barra recta':{mp:['Bíceps braquial','Braquial anterior'],ms:['Braquiorradial','Supinador'],nivel:'Principiante',tecnica:['De pie, agarra la barra con agarre supino a la anchura de los hombros.','Mantén los codos pegados a los costados y el torso completamente estático.','Flexiona los codos levantando la barra hasta la altura del pecho o las clavículas.','Contrae el bíceps al máximo en la posición alta y aguanta 1 segundo.','Baja de forma completamente controlada hasta la extensión total de los brazos.'],consejos:['La clave es mantener los codos fijos; si se mueven, reduces la activación del bíceps.','La barra recta puede causar tensión en las muñecas; la barra Z es más cómoda para muchas personas.','Controla especialmente la fase excéntrica para maximizar la hipertrofia.'],errores:['Usar el impulso del torso (balanceo) para subir la barra.','No extender completamente los brazos al bajar, perdiendo parte del rango de movimiento.']},
  'Curl alterno mancuernas':{mp:['Bíceps braquial'],ms:['Braquial anterior','Braquiorradial'],nivel:'Principiante',tecnica:['De pie o sentado, con una mancuerna en cada mano y los brazos extendidos.','Flexiona un codo levantando la mancuerna mientras supinas el antebrazo (palma hacia arriba).','Lleva la mancuerna hasta la altura del hombro y contrae el bíceps.','Baja de forma controlada mientras comienzas a subir el otro brazo de forma alternada.','Mantén los codos fijos a los costados durante todo el movimiento.'],consejos:['La supinación del antebrazo al subir maximiza la activación del bíceps.','El movimiento alterno permite mayor concentración en cada brazo individualmente.','Utiliza un rango de movimiento completo en cada repetición.'],errores:['Balancear el cuerpo para completar las repeticiones con más peso del necesario.','No supinar completamente el antebrazo, reduciendo la activación del bíceps.']},
  'Curl martillo':{mp:['Braquiorradial','Braquial anterior'],ms:['Bíceps braquial'],nivel:'Principiante',tecnica:['De pie con las mancuernas a los lados en agarre neutro (pulgar hacia arriba, palmas enfrentadas).','Flexiona los codos manteniendo el agarre neutro durante todo el recorrido.','Sube la mancuerna hasta la altura del hombro sin rotar el antebrazo.','Baja de forma controlada hasta la extensión completa del brazo.','Alterna brazos o realiza ambos simultáneamente según preferencia.'],consejos:['El agarre neutro activa más el braquiorradial y el braquial anterior que el bíceps.','Este ejercicio complementa perfectamente los curls convencionales para un desarrollo completo del brazo.','Es más amable con las muñecas que los curls con barra recta.'],errores:['Rotar el antebrazo durante el movimiento, cambiando el agarre neutro.','Mover los codos hacia adelante al subir, reduciendo la tensión en el músculo.']},
  // TRICEPS
  'Press frances barra':{mp:['Tríceps braquial todas las cabezas'],ms:['Ancóneo'],nivel:'Intermedio',tecnica:['Túmbate en un banco plano con la barra sobre el pecho, agarre prono más estrecho que los hombros.','Extiende los brazos por encima del pecho, inclinando ligeramente los codos hacia atrás (hacia la cabeza).','Flexiona los codos bajando la barra hacia la frente o ligeramente por encima de la cabeza.','Extiende de nuevo los codos volviendo a la posición inicial.','Mantén los codos juntos y apuntando al techo durante todo el movimiento.'],consejos:['Bajar la barra hacia la cabeza activa más la cabeza larga del tríceps.','Usa la barra Z para una posición más cómoda de las muñecas.','Mantén los codos lo más quietos posible; si se abren, reduces la activación del tríceps.'],errores:['Dejar que los codos se abran lateralmente al bajar la barra.','No controlar la bajada y arriesgar golpear la frente o la nariz.']},
  'Pushdown polea cuerda':{mp:['Tríceps braquial cabeza lateral'],ms:['Tríceps cabeza larga','Ancóneo'],nivel:'Principiante',tecnica:['Coloca la cuerda en la polea alta. De pie frente a la polea con los pies a la anchura de los hombros.','Agarra los extremos de la cuerda con las palmas enfrentadas y los codos flexionados a 90°.','Empuja hacia abajo extendiendo los codos, separando ligeramente los extremos de la cuerda al final.','En la posición baja, las palmas miran hacia abajo y los pulgares apuntan hacia afuera.','Vuelve de forma controlada a la posición inicial sin levantar los codos.'],consejos:['Separar los extremos de la cuerda al final del movimiento maximiza la contracción del tríceps.','Mantén los codos fijos a los lados; no los eches hacia adelante o atrás.','El cuerpo puede inclinarse ligeramente hacia adelante para mantener tensión constante.'],errores:['Subir los codos al volver a la posición inicial, perdiendo tensión en el tríceps.','Usar el peso del cuerpo para empujar en lugar de la fuerza del tríceps.']},
  'Extension mancuerna sobre cabeza':{mp:['Tríceps braquial cabeza larga'],ms:['Tríceps cabeza lateral','Tríceps cabeza medial'],nivel:'Principiante',tecnica:['Sentado o de pie, sujeta una mancuerna con ambas manos por debajo del disco superior.','Lleva la mancuerna por encima de la cabeza con los brazos completamente extendidos.','Flexiona los codos bajando la mancuerna por detrás de la cabeza, manteniendo los codos apuntando al techo.','Extiende de nuevo los codos volviendo a la posición inicial.','Mantén el core activo y evita arquear la espalda durante el movimiento.'],consejos:['Esta posición estira la cabeza larga del tríceps, que es la más grande y la que más hipertrofia.','Mantén los codos juntos y quietos durante todo el recorrido.','Usa un peso moderado que te permita mantener la forma correcta.'],errores:['Abrir los codos lateralmente, reduciendo la activación de la cabeza larga.','Arquear excesivamente la espalda lumbar al empujar hacia arriba.']},
  // PIERNAS
  'Sentadilla barra trasera':{mp:['Cuádriceps','Glúteo mayor','Isquiotibiales'],ms:['Aductores','Core','Erectores espinales'],nivel:'Principiante',tecnica:['Coloca la barra en el trapecio (sentadilla alta) o en los deltoides posteriores (sentadilla baja).','Los pies deben estar a la anchura de los hombros o algo más, con las puntas ligeramente abiertas.','Inhala, activa el core y desciende como si fueras a sentarte en una silla, llevando las rodillas en línea con los pies.','Baja hasta que los muslos estén paralelos al suelo o más abajo si la movilidad lo permite.','Sube empujando el suelo y manteniendo el torso lo más vertical posible.'],consejos:['La anchura de los pies y la apertura de los pies depende de tu anatomía y movilidad.','Mantén el pecho alto y la mirada hacia adelante durante todo el movimiento.','Usa cuñas bajo los talones si tienes poca dorsiflexión de tobillo.'],errores:['Dejar que las rodillas colapsen hacia adentro (valgo de rodilla) al subir.','Redondear la espalda lumbar en la parte baja del movimiento.']},
  'Peso muerto rumano':{mp:['Isquiotibiales','Glúteo mayor'],ms:['Erectores espinales','Aductores','Core'],nivel:'Principiante',tecnica:['De pie con los pies a la anchura de las caderas, barra o mancuernas frente a ti.','Empuja las caderas hacia atrás manteniendo las rodillas con una leve flexión constante.','Baja las pesas siguiendo el perfil de las piernas hasta sentir el estiramiento en los isquiotibiales.','Mantén la espalda completamente neutra durante todo el descenso.','Vuelve a la posición inicial empujando las caderas hacia adelante, apretando los glúteos al final.'],consejos:['La diferencia con el peso muerto convencional es que las rodillas permanecen prácticamente rectas.','Siente el estiramiento en los isquiotibiales; cuando pierdas la neutralidad lumbar, has llegado al límite.','El movimiento es de bisagra de cadera, no de agacharte.'],errores:['Redondear la espalda lumbar al bajar, especialmente con cargas pesadas.','Doblar excesivamente las rodillas, convirtiendo el ejercicio en una sentadilla.']},
  'Prensa piernas 45':{mp:['Cuádriceps','Glúteo mayor'],ms:['Isquiotibiales','Aductores'],nivel:'Principiante',tecnica:['Siéntate en la máquina con la espalda completamente apoyada en el respaldo.','Coloca los pies en la plataforma a la anchura de los hombros, pies ni demasiado altos ni demasiado bajos.','Libera los seguros y flexiona las rodillas bajando la plataforma de forma controlada.','Baja hasta que las rodillas formen aproximadamente 90° o un poco más.','Empuja con toda la superficie del pie volviendo a la posición inicial sin bloquear las rodillas.'],consejos:['La posición de los pies determina el énfasis: alto y ancho = más glúteo; bajo y estrecho = más cuádriceps.','Nunca bloquees completamente las rodillas en la extensión para proteger la articulación.','Asegúrate de que las rodillas apunten en la dirección de los pies durante todo el movimiento.'],errores:['Dejar que las rodillas colapsen hacia adentro al empujar.','Despegar las nalgas o la espalda baja del asiento, lo que puede causar lesiones lumbares.']},
  'Hip thrust con barra':{mp:['Glúteo mayor'],ms:['Isquiotibiales','Core','Aductores'],nivel:'Principiante',tecnica:['Apoya la parte alta de la espalda en un banco, con las rodillas flexionadas y los pies apoyados en el suelo.','Coloca la barra sobre las caderas, usando una almohadilla para mayor comodidad.','Baja las caderas hacia el suelo y luego empuja hacia arriba extendiendo la cadera.','En la posición alta, el torso debe estar horizontal y las rodillas a 90°.','Contrae fuertemente el glúteo en la posición alta y aguanta 1-2 segundos.'],consejos:['Este es el ejercicio por excelencia para el desarrollo del glúteo mayor.','La posición de los pies afecta al músculo trabajado: más lejos del banco activa más el isquiotibial.','Mantén la barbilla metida hacia el pecho para no hiperextender el cuello.'],errores:['No extender completamente la cadera en la posición alta.','Dejar que las rodillas colapsen hacia adentro durante el empuje.']},
  // CORE
  'Plancha frontal':{mp:['Recto abdominal','Transverso del abdomen'],ms:['Oblicuos','Glúteos','Cuádriceps','Erectores espinales'],nivel:'Principiante',tecnica:['Apóyate sobre los antebrazos y los dedos de los pies, con el cuerpo formando una línea recta.','Los codos deben estar directamente debajo de los hombros y los antebrazos paralelos entre sí.','Aprieta el core, los glúteos y los cuádriceps para mantener la posición.','Mantén la cabeza en posición neutra, mirando al suelo sin levantar la cabeza.','Respira de forma controlada durante todo el tiempo que dura la plancha.'],consejos:['Si la plancha completa es muy difícil, comienza apoyando las rodillas en el suelo.','Aumenta progresivamente el tiempo de mantenimiento, comenzando por 20-30 segundos.','Añade variaciones como levantar un pie o un brazo para aumentar la dificultad.'],errores:['Dejar que las caderas caigan o suban, creando una posición en arco o invertida.','Aguantar la respiración durante la plancha, lo que eleva la presión abdominal.']},
  'Crunch abdominal':{mp:['Recto abdominal'],ms:['Oblicuos externos','Transverso del abdomen'],nivel:'Principiante',tecnica:['Túmbate boca arriba con las rodillas flexionadas y los pies apoyados en el suelo.','Coloca las manos detrás de la cabeza sin entrelazar los dedos, solo apoyadas.','Eleva los hombros del suelo flexionando la columna vertebral, llevando el esternón hacia las rodillas.','Mantén el cuello relajado; no uses los brazos para tirar de la cabeza.','Baja de forma controlada hasta casi tocar el suelo con los omóplatos y repite.'],consejos:['El movimiento es pequeño: solo los hombros se despegan del suelo, no la zona lumbar.','Exhala al subir y concentra la tensión en el abdomen durante todo el movimiento.','Añade resistencia sosteniendo un disco en el pecho para aumentar la dificultad.'],errores:['Tirar del cuello con las manos, lo que puede causar tensión cervical.','Subir demasiado, incorporándose completamente y perdiendo tensión en el abdomen.']},
  'Russian twist con peso':{mp:['Oblicuos externos','Oblicuos internos'],ms:['Recto abdominal','Transverso','Psoas'],nivel:'Intermedio',tecnica:['Siéntate en el suelo con las rodillas flexionadas y los talones a unos 30-40 cm del cuerpo.','Inclina el torso hacia atrás unos 45° manteniendo la espalda recta.','Sujeta el peso (disco, mancuerna o balón) frente al pecho con ambas manos.','Rota el torso hacia un lado llevando el peso casi hasta el suelo.','Vuelve al centro y rota al lado contrario de forma controlada.'],consejos:['Levantar los pies del suelo aumenta la dificultad y activa más el core.','El movimiento debe venir de la rotación del tronco, no solo de los brazos.','Mantén la espalda recta; si la notas redonda, reduce el ángulo de inclinación.'],errores:['Rotar solo los brazos sin rotar el torso.','Hacer el movimiento demasiado rápido, usando el impulso en lugar de la musculatura.']},
  'Ab wheel rollout':{mp:['Recto abdominal','Transverso del abdomen'],ms:['Dorsal ancho','Hombros','Core completo'],nivel:'Avanzado',tecnica:['Arrodíllate en el suelo con la rueda de abdominales directamente debajo de los hombros.','Activa el core y comienza a rodar hacia adelante extendiendo los brazos y el cuerpo.','Llega tan lejos como puedas sin que la cadera caiga o la espalda se arquee.','Vuelve a la posición inicial contrayendo el abdomen, no usando los dorsales en exceso.','Mantén la columna en posición neutra durante todo el recorrido.'],consejos:['Comienza con un rango de movimiento pequeño e incrementa gradualmente.','Este ejercicio requiere gran estabilidad del core; domina la plancha antes de intentarlo.','La versión de pie es considerablemente más difícil que la de rodillas.'],errores:['Dejar que las caderas caigan al extenderse, lo que puede lesionar la zona lumbar.','No activar el core antes de comenzar el movimiento.']},
  'Elevacion piernas colgado':{mp:['Recto abdominal inferior','Psoas ilíaco'],ms:['Oblicuos','Tensor de la fascia lata'],nivel:'Avanzado',tecnica:['Cuélgate de una barra fija con agarre prono a la anchura de los hombros.','Activa el core y las escápulas para estabilizar el cuerpo.','Eleva las piernas juntas llevando las rodillas hacia el pecho (versión fácil) o los pies hacia las manos (versión avanzada).','Baja de forma completamente controlada sin balancear el cuerpo.','Exhala al subir y controla la respiración durante todo el movimiento.'],consejos:['Comienza con las rodillas flexionadas y progresa hacia las piernas rectas.','Evita el balanceo usando la musculatura del abdomen para controlar el descenso.','La retroversión de pelvis al llegar arriba maximiza la contracción del abdomen inferior.'],errores:['Balancear el cuerpo para generar impulso y subir las piernas.','No controlar el descenso, dejando caer las piernas bruscamente.']}
};

8 118,106 Q114,114 107,113 Q100,112 98,104 Q97,80 104,68Z" fill="'+bf('tri')+'" stroke="'+bs('tri')+'" stroke-width="0.9"/><path d="M24,114 Q19,124 21,146 Q25,153 33,153 Q41,153 45,146 Q47,124 42,114Z" fill="'+SD+'" stroke="'+LN+'" stroke-width="0.8"/><path d="M98,114 Q102,124 119,146 Q115,153 107,153 Q99,153 95,146 Q93,124 98,114Z" fill="'+SD+'" stroke="'+LN+'" stroke-width="0.8"/><ellipse cx="31" cy="160" rx="9" ry="10" fill="'+S+'" stroke="'+LN+'" stroke-width="0.7"/><ellipse cx="109" cy="160" rx="9" ry="10" fill="'+S+'" stroke="'+LN+'" stroke-width="0.7"/><path d="M54,156 Q62,152 70,154 Q78,152 86,156 Q88,168 70,170 Q52,168 54,156Z" fill="'+SD+'" stroke="'+LN+'" stroke-width="0.9"/><path d="M54,168 Q46,176 46,196 Q50,210 62,214 Q70,216 70,210 L70,170Z" fill="'+bf('gb')+'" stroke="'+bs('gb')+'" stroke-width="1"/><path d="M86,168 Q94,176 94,196 Q90,210 78,214 Q70,216 70,210 L70,170Z" fill="'+bf('gb')+'" stroke="'+bs('gb')+'" stroke-width="1"/><line x1="70" y1="170" x2="70" y2="212" stroke="'+bs('gb')+'" stroke-width="0.6"/><path d="M46,208 Q40,222 42,250 Q46,264 56,266 Q64,265 66,256 Q68,240 68,216 Q62,212 54,210Z" fill="'+bf('ham')+'" stroke="'+bs('ham')+'" stroke-width="0.9"/><path d="M94,208 Q100,222 98,250 Q94,264 84,266 Q76,265 74,256 Q72,240 72,216 Q78,212 86,210Z" fill="'+bf('ham')+'" stroke="'+bs('ham')+'" stroke-width="0.9"/><ellipse cx="57" cy="270" rx="11" ry="8" fill="'+SD+'" stroke="'+LN+'" stroke-width="0.8"/><ellipse cx="83" cy="270" rx="11" ry="8" fill="'+SD+'" stroke="'+LN+'" stroke-width="0.8"/><path d="M48,278 Q42,292 44,316 Q48,328 57,330 Q66,328 68,316 Q70,292 66,278Z" fill="'+bf('cb')+'" stroke="'+bs('cb')+'" stroke-width="0.9"/><path d="M72,278 Q78,292 96,316 Q92,328 83,330 Q74,328 72,316 Q70,292 72,278Z" fill="'+bf('cb')+'" stroke="'+bs('cb')+'" stroke-width="0.9"/><ellipse cx="58" cy="342" rx="13" ry="5.5" fill="'+S+'" stroke="'+LN+'" stroke-width="0.7"/><ellipse cx="82" cy="342" rx="13" ry="5.5" fill="'+S+'" stroke="'+LN+'" stroke-width="0.7"/></svg>';
  var html='<div class="anatomy"><div class="anatomy-views">';
  if(v==='front'||v==='both') html+='<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">'+front+(v==='both'?'<span class="anatomy-label">Frontal</span>':'')+'</div>';
  if(v==='back'||v==='both') html+='<div style="display:flex;flex-direction:column;align-items:center;gap:2px;">'+back+(v==='both'?'<span class="anatomy-label">Dorsal</span>':'')+'</div>';
  html+='</div>';
  if(v!=='both') html+='<span class="anatomy-label">Vista '+(v==='front'?'frontal':'dorsal')+'</span>';
  html+='<div class="anatomy-legend"><div class="anatomy-dot"></div><span style="font-size:9px;color:var(--gray3);">Zona activa</span></div></div>';
  return html;
}

function renderSidebar(){
  var sb=document.getElementById('sidebar');
  var h='<div class="sidebar-label">Grupo muscular</div>';
  GROUPS.forEach(function(g){h+='<button class="sidebar-btn'+(grp===g.id?' active':'')+'" onclick="setGroup(\''+g.id+'\')">'+g.label+'</button>';});
  h+='<div class="sidebar-div"></div><div class="sidebar-label">Equipamiento</div>';
  EQUIP.forEach(function(e){h+='<button class="sidebar-equip'+(equip===e.id?' active':'')+'" onclick="setEquip(\''+e.id+'\')">'+e.label+'</button>';});
  h+='<div class="sidebar-div"></div><button class="sidebar-warmup'+(view==='warmup'?' active':'')+'" onclick="setView(\'warmup\')">🔥 Calentamiento</button>';
  sb.innerHTML=h;
}

function renderMobileStrip(){
  var strip=document.getElementById('mobile-strip');
  var h='';
  GROUPS.forEach(function(g){h+='<button style="background:'+(grp===g.id?'var(--red)':'#222')+';color:'+(grp===g.id?'#fff':'#aaa')+';border:none;border-radius:20px;padding:5px 12px;cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap;flex-shrink:0;font-family:inherit;" onclick="setGroup(\''+g.id+'\')">'+g.label+'</button>';});
  h+='<div style="width:1px;background:#333;margin:0 4px;flex-shrink:0;"></div>';
  EQUIP.forEach(function(e){h+='<button style="background:transparent;color:'+(equip===e.id?'var(--red)':'#888')+';border:1px solid '+(equip===e.id?'var(--red)':'#333')+';border-radius:20px;padding:5px 12px;cursor:pointer;font-size:11px;white-space:nowrap;flex-shrink:0;font-family:inherit;" onclick="setEquip(\''+e.id+'\')">'+e.label+'</button>';});
  strip.innerHTML=h;
}

function renderList(){
  var s=document.getElementById('search');
  var search=s?s.value.toLowerCase():'';
  var exs=(DB[grp]&&DB[grp][equip])||[];
  var wl=exs.map(function(e,i){return{name:e,level:LVL_PAT[i]||'Intermedio'};});
  var fl=wl.filter(function(e){return(level==='Todos'||e.level===level)&&e.name.toLowerCase().indexOf(search)!==-1;});
  var lh='';
  LEVELS.forEach(function(l){
    var act=level===l;
    var bg=act?(l==='Todos'?'#333':LVL_BG[l]):'#f0f0f0';
    var col=act?(l==='Todos'?'#fff':LVL_C[l]):'#888';
    var bor=act&&l!=='Todos'?'1px solid '+LVL_C[l]+'44':'1px solid transparent';
    lh+='<button onclick="setLevel(\''+l+'\')" style="font-size:10px;padding:3px 7px;border-radius:20px;border:'+bor+';cursor:pointer;font-family:inherit;font-weight:600;background:'+bg+';color:'+col+';">'+(l==='Todos'?'Todos':l.slice(0,5)+'.')+'</button>';
  });
  document.getElementById('levels').innerHTML=lh;
  document.getElementById('count').textContent=fl.length+' ejercicios';
  var h='';
  fl.forEach(function(ex){
    var act=selEx===ex.name;
    var lc=LVL_C[ex.level];var lb=LVL_BG[ex.level];
    h+='<button class="list-item'+(act?' active':'')+'" onclick="showEx(\''+ex.name.replace(/'/g,'\'')+'\',\''+ex.level+'\')">';
    h+='<span>'+ex.name+'</span>';
    h+='<span class="lvl" style="background:'+(act?'rgba(255,255,255,0.25)':lb)+';color:'+(act?'#fff':lc)+';">'+ex.level.slice(0,3).toUpperCase()+'</span>';
    h+='</button>';
  });
  document.getElementById('list-items').innerHTML=h||'<div style="padding:2rem;text-align:center;font-size:13px;color:var(--gray3);">Sin resultados</div>';
}

function renderWarmup(){
  document.getElementById('search-wrap').style.display='none';
  var wus=WARMUPS[grp]||[];
  var gl=GROUPS.find(function(g){return g.id===grp;}).label;
  var h='<div style="padding:12px;border-bottom:1px solid var(--gray2);"><p style="font-size:11px;color:var(--gray3);font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;">Calentamiento — '+gl+'</p>';
  wus.forEach(function(w,i){h+='<div class="warmup-item"><span class="warmup-num">'+(i+1)+'</span><p style="font-size:12.5px;color:var(--black);margin:0;line-height:1.5;">'+w+'</p></div>';});
  h+='<p style="font-size:11px;color:var(--gray3);margin-top:6px;line-height:1.5;">Realiza este calentamiento antes de entrenar '+gl.toLowerCase()+' para activar la zona y prevenir lesiones.</p></div>';
  document.getElementById('list-items').innerHTML=h;
}

function setGroup(g){grp=g;selEx=null;renderSidebar();renderMobileStrip();if(view==='ejercicios'){document.getElementById('search-wrap').style.display='block';renderList();}else renderWarmup();showEmpty();}
function setEquip(e){equip=e;selEx=null;renderSidebar();renderMobileStrip();if(view==='ejercicios')renderList();showEmpty();}
function setLevel(l){level=l;renderList();}
function setView(v){
  view=v;
  document.getElementById('tab-ej').classList.toggle('active',v==='ejercicios');
  document.getElementById('tab-wu').classList.toggle('active',v==='warmup');
  renderSidebar();
  if(v==='ejercicios'){document.getElementById('search-wrap').style.display='block';renderList();}
  else{document.getElementById('search-wrap').style.display='none';renderWarmup();}
}
function showEmpty(){document.getElementById('detail').innerHTML='<div class="empty"><div style="font-size:40px;">🏋️</div><p style="font-size:14px;color:var(--gray3);text-align:center;">Selecciona un ejercicio<br>para ver los detalles</p></div>';}

function showEx(name,lv){
  selEx=name;renderList();
  document.getElementById('list').classList.remove('open');
  var d=getContent(name,grp,equip,lv);
  var gl=GROUPS.find(function(g){return g.id===grp;}).label;
  var el=EQUIP.find(function(e){return e.id===equip;}).label;
  var h='<div class="card">';
  h+='<div class="card-header">';
  h+=getAnatomy(grp);
  h+='<div class="card-body">';
  h+='<h1 class="card-title">'+name+'</h1>';
  h+='<div class="badges">';
  h+='<span class="badge" style="background:var(--red);color:#fff;">'+gl+'</span>';
  h+='<span class="badge" style="background:#f0f0f0;color:#555;border:1px solid var(--gray2);">'+el+'</span>';
  h+='<span class="badge" style="background:'+LVL_BG[lv]+';color:'+LVL_C[lv]+';border:1px solid '+LVL_C[lv]+'44;">'+lv+'</span>';
  h+='</div>';
  if(d.mp&&d.mp.length){h+='<p class="muscles-title">Principales</p><div class="muscles-row">';d.mp.forEach(function(m){h+='<span class="muscle-pill" style="background:var(--red);color:#fff;">'+m+'</span>';});h+='</div>';}
  if(d.ms&&d.ms.length){h+='<p class="muscles-title" style="margin-top:4px;">Secundarios</p><div class="muscles-row">';d.ms.forEach(function(m){h+='<span class="muscle-pill" style="background:#f0f0f0;color:#555;border:1px solid var(--gray2);">'+m+'</span>';});h+='</div>';}
  h+='</div></div>';
  var videoUrl=getVideoUrl(name);
  h+='<a href="'+videoUrl+'" target="_blank" style="display:flex;align-items:center;gap:12px;background:#ff0000;color:#fff;text-decoration:none;padding:14px 18px;border-radius:10px;margin-bottom:10px;font-weight:700;font-size:14px;"><svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.6 9.4.6 9.4.6s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/></svg>Ver vídeo en YouTube</a>';
  h+='<div class="section"><h2 class="section-title" style="color:var(--red);">Técnica de ejecución</h2>';
  (d.tecnica||[]).forEach(function(s,i){h+='<div class="step"><span class="step-num">'+(i+1)+'</span><p class="step-text">'+s+'</p></div>';});
  h+='</div>';
  h+='<div class="section"><h2 class="section-title" style="color:var(--red);">Consejos clave</h2>';
  (d.consejos||[]).forEach(function(t){h+='<div class="tip"><span class="tip-arrow">→</span><p class="tip-text">'+t+'</p></div>';});
  h+='</div>';
  if(d.errores&&d.errores.length){
    h+='<div class="section" style="background:#fff8f8;border-color:#ffdddd;"><h2 class="section-title" style="color:#a32d2d;">Errores comunes</h2>';
    d.errores.forEach(function(e){h+='<div class="err"><span class="err-x">✕</span><p class="err-text">'+e+'</p></div>';});
    h+='</div>';
  }
  h+='</div>';
  document.getElementById('detail').innerHTML=h;
}

document.getElementById('mobile-menu-btn').onclick=function(){document.getElementById('list').classList.toggle('open');};
renderSidebar();renderMobileStrip();renderList();
</script>
</body>
</html>
